<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仓库管理系统</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{background:#f5f5f0;font-family:'PingFang SC','Noto Sans SC','Microsoft YaHei',sans-serif;color:#1a1a1a;}
  input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{opacity:1;}
  select option{background:#fff;color:#1a1a1a;}
  ::-webkit-scrollbar{width:5px;height:5px;}
  ::-webkit-scrollbar-track{background:#f0f0ec;}
  ::-webkit-scrollbar-thumb{background:#d0d0c8;border-radius:3px;}
  .card-hover:hover{box-shadow:0 4px 20px rgba(0,0,0,0.08);transform:translateY(-1px);}
  .card-hover{transition:box-shadow 0.2s,transform 0.2s;}
  .btn-hover:hover{opacity:0.85;}
  .photo-upload:hover{border-color:#888 !important;background:#f0f0ec !important;}
  @keyframes spin{to{transform:rotate(360deg);}}
  .spin{animation:spin 1s linear infinite;display:inline-block;}
  @keyframes fadeIn{from{opacity:0;transform:scale(0.96);}to{opacity:1;transform:scale(1);}}
  .zoom-in{animation:fadeIn 0.15s ease-out;}
  @keyframes slideUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}
  .slide-up{animation:slideUp 0.2s ease-out;}
  @keyframes flash{0%{background:rgba(37,99,235,0.18);}100%{background:transparent;}}
  .qty-flash{animation:flash 0.7s ease-out;}
  .app-shell{display:flex;min-height:100vh;}
  .sidebar{width:220px;flex-shrink:0;background:#fff;border-right:1px solid #e8e8e2;display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
  .sidebar-logo{padding:24px 20px 16px;border-bottom:1px solid #f0f0ec;}
  .sidebar-logo .en{font-size:9px;letter-spacing:4px;color:#999990;text-transform:uppercase;margin-bottom:4px;}
  .sidebar-logo .zh{font-size:20px;font-weight:800;}
  .sidebar-nav{padding:12px 10px;flex:1;}
  .sidebar-nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;margin-bottom:2px;font-size:13px;font-weight:500;color:#666660;border:none;background:none;width:100%;text-align:left;transition:background 0.15s,color 0.15s;}
  .sidebar-nav-item:hover{background:#f5f5f0;color:#1a1a1a;}
  .sidebar-nav-item.active{background:#eff6ff;color:#2563eb;font-weight:700;}
  .sidebar-nav-item .nav-icon{font-size:16px;width:20px;text-align:center;}
  .sidebar-bottom{padding:12px 10px 20px;border-top:1px solid #f0f0ec;}
  .main-content{flex:1;min-width:0;padding:28px 32px;max-width:1100px;}
  .page-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
  .page-title{font-size:22px;font-weight:800;}
  .page-subtitle{font-size:12px;color:#999990;margin-top:3px;}
  .stat-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:12px;margin-bottom:24px;}
  .stat-card{background:#fff;border:1px solid #e8e8e2;border-radius:14px;padding:16px 18px;}
  .stat-label{font-size:10px;color:#999990;letter-spacing:1px;margin-bottom:8px;}
  .stat-value{font-size:28px;font-weight:800;line-height:1;}
  .stat-unit{font-size:10px;color:#999990;margin-top:4px;}
  .shoe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;}
  .log-table{width:100%;border-collapse:collapse;}
  .log-table th{font-size:10px;color:#999990;letter-spacing:1px;text-transform:uppercase;padding:8px 12px;text-align:left;border-bottom:2px solid #e8e8e2;background:#f9f9f7;}
  .log-table td{padding:11px 12px;border-bottom:1px solid #f0f0ec;font-size:13px;vertical-align:middle;}
  .log-table tr:hover td{background:#fafaf8;}
  .mobile-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #e8e8e2;padding:8px 0 16px;z-index:50;}
  .mobile-nav-inner{display:flex;max-width:480px;margin:0 auto;}
  .mobile-nav-btn{flex:1;background:none;border:none;cursor:pointer;padding:8px 0;display:flex;flex-direction:column;align-items:center;gap:3px;}
  .settings-section{background:#fff;border:1px solid #e8e8e2;border-radius:16px;padding:22px 24px;margin-bottom:16px;}
  .settings-section-title{font-size:11px;font-weight:700;letter-spacing:2px;color:#999990;text-transform:uppercase;margin-bottom:18px;padding-bottom:10px;border-bottom:1px solid #f0f0ec;}
  .settings-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f5f5f0;}
  .settings-row:last-child{border-bottom:none;padding-bottom:0;}
  .settings-label{font-size:13px;font-weight:600;color:#1a1a1a;}
  .settings-desc{font-size:11px;color:#999990;margin-top:2px;}
  @media(max-width:768px){
    .sidebar{display:none !important;}
    .main-content{padding:14px 14px 84px;max-width:none;}
    .mobile-nav{display:block;}
    .stat-grid{grid-template-columns:1fr 1fr;}
    .shoe-grid{grid-template-columns:1fr;}
    .page-header{margin-bottom:16px;}
    .page-title{font-size:18px;}
  }
  @media(min-width:769px) and (max-width:1024px){
    .stat-grid{grid-template-columns:repeat(3,1fr);}
    .main-content{padding:24px;}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useCallback,useRef,useEffect}=React;
const CLOUD_CONFIG={binId:"69a92606ae596e708f61143c",masterKey:"$2a$10$3YSGRJC241CXsBpeivsTP.NHutZ7G.qgoZyFYBB2IJs4CX/OHeno."};
const CLOUD_ON=CLOUD_CONFIG.binId!=="YOUR_BIN_ID_HERE";
const CDN={cloudName:"dvkf38yoa",uploadPreset:"wms_unsigned"};
const SIZES=[36,37,38,39,40,41,42,43,44];
const KEY_SHOES="wms_shoes_v3",KEY_LOGS="wms_logs_v3",KEY_AUTH="wms_auth_v1",KEY_PW="wms_pw_v1",KEY_THRESH="wms_thresh_v1";
const DEFAULT_SHOES=[
  {id:"1",brand:"Nike",name:"Air Max",color:"黑色",photoUrl:""},
  {id:"2",brand:"Nike",name:"Air Force 1",color:"白色",photoUrl:""},
  {id:"3",brand:"Adidas",name:"Stan Smith",color:"白色",photoUrl:""},
  {id:"4",brand:"Adidas",name:"Superstar",color:"黑白",photoUrl:""},
  {id:"5",brand:"New Balance",name:"574",color:"灰色",photoUrl:""},
  {id:"6",brand:"Vans",name:"Old Skool",color:"黑白",photoUrl:""},
  {id:"7",brand:"Converse",name:"Chuck 70",color:"白色",photoUrl:""},
];
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtTime(iso){return new Date(iso).toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"});}
function loadLS(key,def){try{const v=localStorage.getItem(key);return v?JSON.parse(v):def;}catch{return def;}}
function saveLS(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch{}}
async function cloudFetch(){const res=await fetch(`https://api.jsonbin.io/v3/b/${CLOUD_CONFIG.binId}/latest`,{headers:{"X-Master-Key":CLOUD_CONFIG.masterKey}});if(!res.ok)throw new Error("fetch failed");return(await res.json()).record;}
async function cloudSave(record){const res=await fetch(`https://api.jsonbin.io/v3/b/${CLOUD_CONFIG.binId}`,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":CLOUD_CONFIG.masterKey,"X-Bin-Versioning":"false"},body:JSON.stringify(record)});if(!res.ok)throw new Error("save failed");}
async function uploadToCloudinary(file){
  const blob=await new Promise(resolve=>{const reader=new FileReader();reader.onload=e=>{const img=new Image();img.onload=()=>{const MAX=800;let w=img.width,h=img.height;if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}const canvas=document.createElement("canvas");canvas.width=w;canvas.height=h;canvas.getContext("2d").drawImage(img,0,0,w,h);canvas.toBlob(b=>resolve(b),"image/jpeg",0.82);};img.src=e.target.result;};reader.readAsDataURL(file);});
  const fd=new FormData();fd.append("file",blob);fd.append("upload_preset",CDN.uploadPreset);fd.append("folder","wms_shoes");
  const res=await fetch(`https://api.cloudinary.com/v1_1/${CDN.cloudName}/image/upload`,{method:"POST",body:fd});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||"上传失败");}
  const data=await res.json();
  return data.secure_url.replace("/upload/","/upload/c_fill,w_400,h_400,q_auto,f_auto/");
}
function buildInv(shoes,logs){const inv={};shoes.forEach(s=>{inv[s.id]={};SIZES.forEach(sz=>{inv[s.id][sz]=0;});});logs.forEach(l=>{if(inv[l.shoeId]&&inv[l.shoeId][l.size]!==undefined)inv[l.shoeId][l.size]+=l.type==="in"?l.qty:-l.qty;});return inv;}
const C={bg:"#f5f5f0",surface:"#ffffff",border:"#e8e8e2",border2:"#d8d8d0",text:"#1a1a1a",text2:"#666660",text3:"#999990",green:"#16a34a",greenBg:"#f0fdf4",greenBd:"#bbf7d0",red:"#dc2626",redBg:"#fef2f2",redBd:"#fecaca",yellow:"#d97706",yellowBg:"#fffbeb",yellowBd:"#fde68a",accent:"#2563eb",accentBg:"#eff6ff",accentBd:"#bfdbfe"};

function App(){
  const[shoes,setShoes]=useState(()=>loadLS(KEY_SHOES,DEFAULT_SHOES));
  const[logs,setLogs]=useState(()=>loadLS(KEY_LOGS,[]));
  const[page,setPage]=useState("home");
  const[batchModal,setBatchModal]=useState(null);
  const[batchForm,setBatchForm]=useState({});
  const[shoeModal,setShoeModal]=useState(null);
  const[shoeForm,setShoeForm]=useState({brand:"",name:"",color:""});
  const[detailShoe,setDetailShoe]=useState(null);
  const[syncStatus,setSyncStatus]=useState(CLOUD_ON?"idle":"offline");
  const[lastSync,setLastSync]=useState(null);
  const[adminPw,setAdminPw]=useState(()=>loadLS(KEY_PW,"1234"));
  const[isAdmin,setIsAdmin]=useState(()=>loadLS(KEY_AUTH,false));
  const[pwModal,setPwModal]=useState(null);
  const[pwInput,setPwInput]=useState("");
  const[pwError,setPwError]=useState(false);
  const[zoomPhoto,setZoomPhoto]=useState(null);
  const[uploadState,setUploadState]=useState({});
  const[toast,setToast]=useState(null);
  const[isMobile,setIsMobile]=useState(window.innerWidth<=768);
  const[keyword,setKeyword]=useState("");
  const[sortBy,setSortBy]=useState("default");
  const[lowThresh,setLowThresh]=useState(()=>loadLS(KEY_THRESH,3));
  const[flashIds,setFlashIds]=useState({});
  const saveTimer=useRef(null);

  useEffect(()=>{const h=()=>setIsMobile(window.innerWidth<=768);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);
  function showToast(msg,type="ok"){setToast({msg,type});setTimeout(()=>setToast(null),2600);}
  function requireAdmin(action){if(isAdmin){action();return;}setPwInput("");setPwError(false);setPwModal({action});}
  function submitPassword(){if(pwInput===adminPw){setIsAdmin(true);saveLS(KEY_AUTH,true);const act=pwModal?.action;setPwModal(null);setPwInput("");setPwError(false);if(act)act();}else{setPwError(true);setPwInput("");}}
  function logout(){setIsAdmin(false);saveLS(KEY_AUTH,false);}
  const persistLocal=useCallback((s,l)=>{saveLS(KEY_SHOES,s);saveLS(KEY_LOGS,l);},[]);
  const scheduleCloud=useCallback((s,l)=>{if(!CLOUD_ON)return;clearTimeout(saveTimer.current);setSyncStatus("syncing");saveTimer.current=setTimeout(async()=>{try{await cloudSave({shoes:s,logs:l});setSyncStatus("ok");setLastSync(new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"}));}catch{setSyncStatus("error");}},1200);},[]);
  const pullCloud=useCallback(async(quiet=false)=>{if(!CLOUD_ON)return;if(!quiet)setSyncStatus("syncing");try{const rec=await cloudFetch();if(rec&&rec.shoes&&rec.shoes.length>0){const ms=rec.shoes.map(s=>({photoUrl:"",...s}));setShoes(ms);saveLS(KEY_SHOES,ms);setLogs(rec.logs||[]);saveLS(KEY_LOGS,rec.logs||[]);}else{const ls=loadLS(KEY_SHOES,DEFAULT_SHOES),ll=loadLS(KEY_LOGS,[]);await cloudSave({shoes:ls,logs:ll});setShoes(ls);setLogs(ll);}setSyncStatus("ok");setLastSync(new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"}));}catch{setSyncStatus("error");}},[]);
  useEffect(()=>{if(!CLOUD_ON)return;pullCloud();const id=setInterval(()=>pullCloud(true),60000);const onFocus=()=>pullCloud(true);window.addEventListener("focus",onFocus);return()=>{clearInterval(id);window.removeEventListener("focus",onFocus);};},[pullCloud]);
  useEffect(()=>{const h=e=>{if(e.key==="Escape"){setZoomPhoto(null);setDetailShoe(null);}};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[]);

  function updateShoes(d){setShoes(d);persistLocal(d,logs);scheduleCloud(d,logs);}
  function updateLogs(d,flashShoeId){
    setLogs(d);persistLocal(shoes,d);scheduleCloud(shoes,d);
    if(flashShoeId){setFlashIds(f=>({...f,[flashShoeId]:Date.now()}));setTimeout(()=>setFlashIds(f=>{const n={...f};delete n[flashShoeId];return n;}),800);}
  }

  const inv=buildInv(shoes,logs);
  const today=todayStr();
  const todayLogs=logs.filter(l=>l.date===today);
  const todayIn=todayLogs.filter(l=>l.type==="in").reduce((a,b)=>a+b.qty,0);
  const todayOut=todayLogs.filter(l=>l.type==="out").reduce((a,b)=>a+b.qty,0);
  const totalStock=shoes.reduce((s,sh)=>s+SIZES.reduce((a,sz)=>a+(inv[sh.id]?.[sz]||0),0),0);
  const shoeById={};shoes.forEach(s=>{shoeById[s.id]=s;});
  function shoeTotal(id){return SIZES.reduce((a,sz)=>a+(inv[id]?.[sz]||0),0);}
  const soldOutStyles=shoes.filter(sh=>SIZES.some(sz=>(inv[sh.id]?.[sz]||0)===0)).length;
  const lowStockStyles=shoes.filter(sh=>SIZES.some(sz=>{const q=inv[sh.id]?.[sz]||0;return q>0&&q<=lowThresh;})).length;

  // 品牌库存：含款式列表
  const brandMap={};
  shoes.forEach(sh=>{if(!brandMap[sh.brand])brandMap[sh.brand]={total:0,shoes:[]};brandMap[sh.brand].total+=shoeTotal(sh.id);brandMap[sh.brand].shoes.push(sh);});

  const sizeTotal={};SIZES.forEach(sz=>{sizeTotal[sz]=shoes.reduce((a,sh)=>a+(inv[sh.id]?.[sz]||0),0);});
  const logsByDate={};logs.forEach(l=>{if(!logsByDate[l.date])logsByDate[l.date]=[];logsByDate[l.date].push(l);});
  const sortedDates=Object.keys(logsByDate).sort((a,b)=>b.localeCompare(a));
  const filteredShoes=shoes.filter(s=>`${s.brand}${s.name}${s.color}`.toLowerCase().includes(keyword.toLowerCase()));
  const sortedShoes=[...filteredShoes].sort((a,b)=>{
    if(sortBy==="stock-desc")return shoeTotal(b.id)-shoeTotal(a.id);
    if(sortBy==="stock-asc")return shoeTotal(a.id)-shoeTotal(b.id);
    if(sortBy==="brand")return a.brand.localeCompare(b.brand);
    if(sortBy==="soldout"){const sa=SIZES.filter(sz=>(inv[a.id]?.[sz]||0)===0).length;const sb=SIZES.filter(sz=>(inv[b.id]?.[sz]||0)===0).length;return sb-sa;}
    return 0;
  });

  // 导出备份
  function exportData(){
    const data={exportTime:new Date().toISOString(),shoes,logs};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download=`仓库备份_${todayStr()}.json`;a.click();URL.revokeObjectURL(url);
    showToast("✓ 备份已下载");
  }
  function importData(file){
    if(!file)return;
    const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        if(!data.shoes||!data.logs)throw new Error("格式错误");
        if(!confirm(`确认导入？将覆盖现有数据。\n包含 ${data.shoes.length} 款鞋，${data.logs.length} 条记录。`))return;
        updateShoes(data.shoes);updateLogs(data.logs);
        showToast(`✓ 导入成功：${data.shoes.length}款 / ${data.logs.length}条`);
      }catch{showToast("❌ 文件格式错误","err");}
    };
    reader.readAsText(file);
  }

  async function handlePhotoUpload(shoeId,file){
    if(!file)return;
    setUploadState(s=>({...s,[shoeId]:"uploading"}));
    try{
      const url=await uploadToCloudinary(file);
      setShoes(prev=>{const updated=prev.map(s=>s.id===shoeId?{...s,photoUrl:url}:s);persistLocal(updated,logs);scheduleCloud(updated,logs);return updated;});
      setUploadState(s=>({...s,[shoeId]:"done"}));
      showToast("✓ 图片上传成功");
      setTimeout(()=>setUploadState(s=>{const n={...s};delete n[shoeId];return n;}),2000);
    }catch(err){
      setUploadState(s=>({...s,[shoeId]:"error"}));
      showToast("❌ 上传失败："+err.message,"err");
      setTimeout(()=>setUploadState(s=>{const n={...s};delete n[shoeId];return n;}),3000);
    }
  }
  function removePhoto(shoeId){updateShoes(shoes.map(s=>s.id===shoeId?{...s,photoUrl:""}:s));}
  function openBatch(type,shoeId){const f={note:""};SIZES.forEach(sz=>{f[sz]="";});setBatchForm(f);setBatchModal({type,shoeId:shoeId||shoes[0]?.id});}
  function submitBatch(){
    const entries=Object.entries(batchForm).filter(([k,v])=>!isNaN(parseInt(k))&&parseInt(v)>0);
    if(!entries.length)return;
    if(batchModal.type==="out"){for(const[sz,v]of entries){const cur=inv[batchModal.shoeId]?.[parseInt(sz)]||0;if(parseInt(v)>cur){alert(`${shoeById[batchModal.shoeId]?.brand} ${shoeById[batchModal.shoeId]?.name} ${sz}码库存不足！当前仅剩 ${cur} 双`);return;}}}
    updateLogs([...entries.map(([sz,v])=>({id:genId(),type:batchModal.type,shoeId:batchModal.shoeId,size:parseInt(sz),qty:parseInt(v),note:batchForm.note||"",date:today,time:new Date().toISOString()})),...logs],batchModal.shoeId);
    setBatchModal(null);setBatchForm({});
  }
  function submitShoe(){if(!shoeForm.brand||!shoeForm.name)return;if(shoeModal==="add"){updateShoes([...shoes,{...shoeForm,id:genId(),photoUrl:""}]);}else{updateShoes(shoes.map(s=>s.id===shoeModal.id?{...s,...shoeForm}:s));}setShoeModal(null);setShoeForm({brand:"",name:"",color:""});}
  function deleteShoe(id){if(!confirm("确认删除该款鞋子？"))return;updateShoes(shoes.filter(s=>s.id!==id));}
  function deleteLog(id){if(!confirm("确认删除该条记录？删除后库存会同步更新。"))return;updateLogs(logs.filter(l=>l.id!==id));}

  const inp={width:"100%",background:"#fff",border:`1px solid ${C.border2}`,borderRadius:10,padding:"11px 14px",color:C.text,fontSize:14,outline:"none",boxSizing:"border-box"};

  function getSzColor(qty){return qty===0?C.red:qty<=lowThresh?C.yellow:C.green;}
  function getSzBg(qty){return qty===0?C.redBg:qty<=lowThresh?C.yellowBg:C.greenBg;}
  function getSzBd(qty){return qty===0?C.redBd:qty<=lowThresh?C.yellowBd:C.greenBd;}

  function SzCell({qty,sz,compact}){
    const col=getSzColor(qty);const bg=getSzBg(qty);const bd=getSzBd(qty);
    return(<div style={{background:bg,border:`1px solid ${bd}`,borderRadius:compact?6:8,padding:compact?"4px 2px":"7px 2px",textAlign:"center"}}><div style={{fontSize:compact?7:8,color:C.text3,marginBottom:compact?1:3}}>{sz}</div><div style={{fontSize:compact?11:14,fontWeight:800,color:col,lineHeight:1}}>{qty}</div></div>);
  }

  function PhotoBox({shoe,size=110,rounded=false}){
    const ref=useRef();const url=shoe?.photoUrl||"";const sid=shoe?.id;const st=uploadState[sid];const r=rounded?12:0;
    return(
      <div style={{width:size,height:size,flexShrink:0,position:"relative",background:"#f8f8f5",borderRadius:r,overflow:"hidden"}} onClick={e=>e.stopPropagation()}>
        {url?(
          <>
            <img src={url} alt="" loading="lazy" style={{width:size,height:size,objectFit:"cover",display:"block",borderRadius:r}} onError={e=>{e.target.style.display="none";}}/>
            <button onClick={e=>{e.stopPropagation();setZoomPhoto(url);}} style={{position:"absolute",bottom:6,right:6,width:24,height:24,borderRadius:7,background:"rgba(0,0,0,0.55)",border:"1.5px solid rgba(255,255,255,0.7)",color:"#fff",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>⤢</button>
            {isAdmin&&<button onClick={e=>{e.stopPropagation();removePhoto(sid);}} style={{position:"absolute",top:6,right:6,width:22,height:22,borderRadius:"50%",background:"rgba(220,38,38,0.9)",border:"2px solid #fff",color:"#fff",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,lineHeight:1}}>×</button>}
          </>
        ):st==="uploading"?(
          <div style={{width:size,height:size,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,background:"#f0f4ff"}}><span className="spin" style={{fontSize:22,color:C.accent}}>↻</span><span style={{fontSize:10,color:C.accent}}>上传中…</span></div>
        ):isAdmin?(
          <div className="photo-upload" onClick={e=>{e.stopPropagation();ref.current?.click();}} style={{width:size,height:size,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",gap:5,border:`1.5px dashed ${st==="error"?C.red:C.border2}`,background:st==="error"?"#fff5f5":"#fafaf8"}}>
            <span style={{fontSize:Math.round(size*0.27),color:st==="error"?C.red:C.text3}}>{st==="error"?"⚠":"📷"}</span>
            <span style={{fontSize:10,color:st==="error"?C.red:C.text3,textAlign:"center",padding:"0 4px"}}>{st==="error"?"上传失败":"点击上传"}</span>
          </div>
        ):(
          <div style={{width:size,height:size,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:5}}><span style={{fontSize:Math.round(size*0.32),color:C.text3}}>👟</span></div>
        )}
        {isAdmin&&<input ref={ref} type="file" accept="image/*" style={{display:"none"}} onChange={e=>{if(e.target.files[0])handlePhotoUpload(sid,e.target.files[0]);e.target.value="";}}/>}
      </div>
    );
  }

  // ───────── 品牌库存+尺码汇总组件（折叠展开） ─────────
  function BrandAndSize({inv,brandMap,sizeTotal,isMobile,lowThresh,shoeTotal,setDetailShoe,getSzColor}){
    const[expanded,setExpanded]=useState({});
    function toggle(brand){setExpanded(e=>({...e,[brand]:!e[brand]}));}
    return(
      <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 320px",gap:14,marginBottom:24,alignItems:"start"}}>
        {/* 左：品牌折叠列表 */}
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,overflow:"hidden"}}>
          <div style={{padding:"14px 18px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{fontSize:9,letterSpacing:2,color:C.text3,textTransform:"uppercase"}}>品牌库存</div>
            <div style={{fontSize:10,color:C.text3}}>点击品牌展开款式</div>
          </div>
          {Object.entries(brandMap).map(([brand,info],bi)=>{
            const isOpen=!!expanded[brand];
            const brandSoldOut=info.shoes.some(sh=>SIZES.some(sz=>(inv[sh.id]?.[sz]||0)===0));
            const brandLow=info.shoes.some(sh=>SIZES.some(sz=>{const q=inv[sh.id]?.[sz]||0;return q>0&&q<=lowThresh;}));
            return(
              <div key={brand} style={{borderBottom:bi<Object.keys(brandMap).length-1?`1px solid ${C.border}`:"none"}}>
                {/* 品牌行 — 点击折叠/展开 */}
                <div onClick={()=>toggle(brand)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"13px 18px",cursor:"pointer",background:isOpen?"#f9f9f7":C.surface,transition:"background 0.15s"}}>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:13,fontWeight:700,color:C.text}}>{brand}</span>
                    <span style={{fontSize:11,color:C.text3}}>{info.shoes.length}款</span>
                    {brandSoldOut&&<span style={{fontSize:9,color:C.red,background:C.redBg,border:`1px solid ${C.redBd}`,borderRadius:4,padding:"1px 5px",fontWeight:600}}>断码</span>}
                    {brandLow&&!brandSoldOut&&<span style={{fontSize:9,color:C.yellow,background:C.yellowBg,border:`1px solid ${C.yellowBd}`,borderRadius:4,padding:"1px 5px",fontWeight:600}}>低库</span>}
                  </div>
                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:20,fontWeight:800,color:C.text}}>{info.total}<span style={{fontSize:10,color:C.text3,marginLeft:2}}>双</span></span>
                    <span style={{fontSize:12,color:C.text3,transition:"transform 0.2s",display:"inline-block",transform:isOpen?"rotate(180deg)":"rotate(0deg)"}}>▾</span>
                  </div>
                </div>
                {/* 展开的款式列表 */}
                {isOpen&&(
                  <div style={{background:"#f9f9f7",borderTop:`1px solid ${C.border}`,padding:"8px 14px 12px"}}>
                    <div style={{display:"flex",flexDirection:"column",gap:5}}>
                      {info.shoes.map(sh=>{
                        const tot=shoeTotal(sh.id);
                        const hasSoldOut=SIZES.some(sz=>(inv[sh.id]?.[sz]||0)===0);
                        const hasLow=SIZES.some(sz=>{const q=inv[sh.id]?.[sz]||0;return q>0&&q<=lowThresh;});
                        return(
                          <div key={sh.id} onClick={()=>setDetailShoe(sh)} style={{display:"flex",alignItems:"center",gap:8,background:C.surface,borderRadius:9,padding:"7px 10px",cursor:"pointer",border:`1px solid ${hasSoldOut?"#fca5a5":C.border}`}}>
                            {sh.photoUrl
                              ?<img src={sh.photoUrl} alt="" loading="lazy" style={{width:32,height:32,objectFit:"cover",borderRadius:6,flexShrink:0,border:`1px solid ${C.border}`}}/>
                              :<div style={{width:32,height:32,borderRadius:6,background:"#f0f0ec",display:"flex",alignItems:"center",justifyContent:"center",fontSize:16,flexShrink:0}}>👟</div>
                            }
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontSize:12,fontWeight:600,color:C.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{sh.name}</div>
                              <div style={{fontSize:10,color:C.text3}}>{sh.color}</div>
                            </div>
                            <div style={{textAlign:"right",flexShrink:0}}>
                              <div style={{fontSize:14,fontWeight:800,color:hasSoldOut?C.red:hasLow?C.yellow:C.text}}>{tot}</div>
                              {hasSoldOut&&<div style={{fontSize:8,color:C.red,fontWeight:600}}>断码</div>}
                              {hasLow&&!hasSoldOut&&<div style={{fontSize:8,color:C.yellow,fontWeight:600}}>低库</div>}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                )}
              </div>
            );
          })}
        </div>
        {/* 右：全款尺码汇总 — 固定宽度独立列 */}
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,padding:"16px 18px"}}>
          <div style={{fontSize:9,letterSpacing:2,color:C.text3,textTransform:"uppercase",marginBottom:14}}>全款尺码汇总</div>
          <div style={{display:"grid",gridTemplateColumns:`repeat(${SIZES.length},1fr)`,gap:4,marginBottom:10}}>
            {SIZES.map(sz=><SzCell key={sz} qty={sizeTotal[sz]} sz={sz}/>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:`repeat(${SIZES.length},1fr)`,gap:4,marginBottom:16}}>
            {SIZES.map(sz=>{const max=Math.max(...Object.values(sizeTotal),1);const pct=Math.round((sizeTotal[sz]/max)*100);const col=getSzColor(sizeTotal[sz]);return(<div key={sz} style={{height:28,background:"#f0f0ec",borderRadius:4,overflow:"hidden",display:"flex",alignItems:"flex-end"}}><div style={{width:"100%",height:`${pct}%`,background:col,borderRadius:4,minHeight:sizeTotal[sz]>0?3:0}}/></div>);})}
          </div>
          {/* 尺码预警汇总 */}
          {SIZES.filter(sz=>sizeTotal[sz]===0).length>0&&(
            <div style={{fontSize:10,color:C.red,fontWeight:500,marginBottom:6}}>⚠ 全断码：{SIZES.filter(sz=>sizeTotal[sz]===0).join(" / ")} 码</div>
          )}
          {SIZES.filter(sz=>sizeTotal[sz]>0&&sizeTotal[sz]<=lowThresh*2).length>0&&(
            <div style={{fontSize:10,color:C.yellow,fontWeight:500}}>▲ 全款低库：{SIZES.filter(sz=>sizeTotal[sz]>0&&sizeTotal[sz]<=lowThresh*2).join(" / ")} 码</div>
          )}
        </div>
      </div>
    );
  }

  function SyncBadge(){
    const base={fontSize:10,display:"flex",alignItems:"center",gap:4};
    if(syncStatus==="offline")return<div style={{...base,color:C.text3}}><span>💾</span><span>本地模式</span></div>;
    if(syncStatus==="syncing")return<div style={{...base,color:C.accent}}><span className="spin">↻</span><span>同步中</span></div>;
    if(syncStatus==="ok")return<div style={{...base,color:C.green,cursor:"pointer"}} onClick={()=>pullCloud()}><span>✓</span><span>已同步 {lastSync}</span></div>;
    if(syncStatus==="error")return<div style={{...base,color:C.red,cursor:"pointer"}} onClick={()=>pullCloud()}><span>⚠</span><span>同步失败 点击重试</span></div>;
    return null;
  }

  const nav=[{key:"home",icon:"▦",label:"总览"},{key:"ops",icon:"⇅",label:"进出仓"},{key:"logs",icon:"≡",label:"流水"},{key:"shoes",icon:"◈",label:"款式管理"},{key:"settings",icon:"⚙",label:"设置"}];
  const modalWrap=(mobile)=>({position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:mobile?"flex-end":"center",justifyContent:"center",zIndex:100});
  const modalBox=(mobile)=>({background:C.surface,borderRadius:mobile?"20px 20px 0 0":20,width:"100%",maxWidth:520,margin:mobile?"0":"auto",padding:22,maxHeight:"92vh",overflowY:"auto",boxShadow:"0 -8px 40px rgba(0,0,0,0.12)"});

  // ───────── 总览页 ─────────
  function PageHome(){
    return(
      <div>
        <div className="page-header">
          <div><div className="page-title">库存总览</div><div className="page-subtitle">{new Date().toLocaleDateString("zh-CN",{year:"numeric",month:"long",day:"numeric",weekday:"long"})}</div></div>
          {isAdmin&&<button className="btn-hover" onClick={()=>requireAdmin(()=>openBatch("in",null))} style={{background:C.green,border:"none",borderRadius:10,padding:"10px 20px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>↑ 快速入仓</button>}
        </div>
        <div className="stat-grid">
          {[{label:"总库存",value:totalStock,color:C.text,bg:"#fff",bd:C.border,unit:"双"},{label:"今日入仓",value:todayIn,color:C.green,bg:C.greenBg,bd:C.greenBd,unit:"双"},{label:"今日出仓",value:todayOut,color:C.red,bg:C.redBg,bd:C.redBd,unit:"双"},{label:"款式总数",value:shoes.length,color:C.accent,bg:C.accentBg,bd:C.accentBd,unit:"款"},{label:"断码款式",value:soldOutStyles,color:C.red,bg:C.redBg,bd:C.redBd,unit:"款"},{label:"低库款式",value:lowStockStyles,color:C.yellow,bg:C.yellowBg,bd:C.yellowBd,unit:"款"}].map(s=>(
            <div key={s.label} className="stat-card" style={{background:s.bg,border:`1px solid ${s.bd}`}}>
              <div className="stat-label">{s.label}</div><div className="stat-value" style={{color:s.color}}>{s.value}</div><div className="stat-unit">{s.unit}</div>
            </div>
          ))}
        </div>

        {/* 品牌库存（折叠）+ 全款尺码汇总 — 三列布局 */}
        <BrandAndSize inv={inv} brandMap={brandMap} sizeTotal={sizeTotal} isMobile={isMobile} lowThresh={lowThresh} shoeTotal={shoeTotal} setDetailShoe={setDetailShoe} getSzColor={getSzColor}/>

        {/* 搜索 + 排序 */}
        <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap",alignItems:"center"}}>
          <div style={{flex:1,minWidth:180,position:"relative"}}>
            <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontSize:14,color:C.text3,pointerEvents:"none"}}>🔍</span>
            <input value={keyword} onChange={e=>setKeyword(e.target.value)} placeholder="搜索品牌 / 款式 / 颜色…" style={{width:"100%",background:"#fff",border:`1px solid ${C.border2}`,borderRadius:10,padding:"9px 12px 9px 34px",fontSize:13,outline:"none",color:C.text}}/>
            {keyword&&<button onClick={()=>setKeyword("")} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",cursor:"pointer",color:C.text3,fontSize:16,lineHeight:1}}>×</button>}
          </div>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {[{v:"default",label:"默认"},{v:"stock-desc",label:"库存↓"},{v:"stock-asc",label:"库存↑"},{v:"brand",label:"品牌"},{v:"soldout",label:"断码优先"}].map(s=>(
              <button key={s.v} onClick={()=>setSortBy(s.v)} style={{background:sortBy===s.v?C.accent:"#fff",color:sortBy===s.v?"#fff":C.text2,border:`1px solid ${sortBy===s.v?C.accent:C.border2}`,borderRadius:8,padding:"7px 12px",fontSize:11,cursor:"pointer",fontWeight:sortBy===s.v?700:400,transition:"all 0.15s"}}>{s.label}</button>
            ))}
          </div>
        </div>
        <div style={{fontSize:9,letterSpacing:2,color:C.text3,textTransform:"uppercase",marginBottom:12}}>款式库存 · {sortedShoes.length}{filteredShoes.length<shoes.length?` / ${shoes.length}`:""}款</div>
        <div className="shoe-grid">
          {sortedShoes.map(shoe=>{
            const total=shoeTotal(shoe.id);
            const soldOut=SIZES.filter(sz=>(inv[shoe.id]?.[sz]||0)===0);
            const low=SIZES.filter(sz=>{const q=inv[shoe.id]?.[sz]||0;return q>0&&q<=lowThresh;});
            const isFlashing=!!flashIds[shoe.id];
            return(
              <div key={shoe.id} className={`card-hover${isFlashing?" qty-flash":""}`} onClick={()=>setDetailShoe(shoe)} style={{background:C.surface,border:`1px solid ${soldOut.length?"#fca5a5":C.border}`,borderRadius:16,overflow:"hidden",cursor:"pointer"}}>
                <div style={{display:"flex"}}><PhotoBox shoe={shoe} size={isMobile?100:120}/>
                  <div style={{flex:1,padding:"14px 16px",display:"flex",flexDirection:"column",justifyContent:"center",minWidth:0}}>
                    <div style={{fontSize:15,fontWeight:800,lineHeight:1.2}}>{shoe.brand}</div>
                    <div style={{fontSize:13,fontWeight:600,color:C.text2}}>{shoe.name}</div>
                    <div style={{fontSize:11,color:C.text3,marginTop:2}}>{shoe.color}</div>
                    <div style={{marginTop:10,display:"flex",alignItems:"baseline",gap:3}}><span style={{fontSize:30,fontWeight:800,lineHeight:1}}>{total}</span><span style={{fontSize:11,color:C.text3}}>双</span></div>
                  </div>
                </div>
                <div style={{padding:"10px 12px 12px",borderTop:`1px solid ${C.border}`}}>
                  <div style={{display:"grid",gridTemplateColumns:`repeat(${SIZES.length},1fr)`,gap:3}}>{SIZES.map(sz=><SzCell key={sz} qty={inv[shoe.id]?.[sz]||0} sz={sz} compact/>)}</div>
                  {soldOut.length>0&&<div style={{fontSize:10,color:C.red,marginTop:8,fontWeight:500}}>⚠ 断码：{soldOut.join(" / ")} 码</div>}
                  {low.length>0&&!soldOut.length&&<div style={{fontSize:10,color:C.yellow,marginTop:8}}>▲ 低库存：{low.join(" / ")} 码</div>}
                  {isAdmin&&<div style={{display:"flex",gap:6,marginTop:10}} onClick={e=>e.stopPropagation()}>
                    <button onClick={e=>{e.stopPropagation();requireAdmin(()=>openBatch("in",shoe.id));}} style={{flex:1,background:C.greenBg,border:`1px solid ${C.greenBd}`,borderRadius:8,padding:"6px 0",color:C.green,fontSize:11,fontWeight:700,cursor:"pointer"}}>↑ 入仓</button>
                    <button onClick={e=>{e.stopPropagation();requireAdmin(()=>openBatch("out",shoe.id));}} style={{flex:1,background:C.redBg,border:`1px solid ${C.redBd}`,borderRadius:8,padding:"6px 0",color:C.red,fontSize:11,fontWeight:700,cursor:"pointer"}}>↓ 出仓</button>
                  </div>}
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  }

  // ───────── 进出仓页 ─────────
  function PageOps(){
    return(
      <div>
        <div className="page-header"><div><div className="page-title">进出仓</div><div className="page-subtitle">今日 {todayLogs.length} 笔记录</div></div></div>
        <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr 1fr":"200px 200px",gap:12,marginBottom:28}}>
          {[{type:"in",icon:"↑",label:"入仓",bg:C.greenBg,border:C.greenBd,color:C.green},{type:"out",icon:"↓",label:"出仓",bg:C.redBg,border:C.redBd,color:C.red}].map(b=>(
            <button key={b.type} className="btn-hover" onClick={()=>requireAdmin(()=>openBatch(b.type,null))} style={{background:b.bg,border:`1.5px solid ${b.border}`,borderRadius:16,padding:"24px 12px",cursor:"pointer",color:b.color,textAlign:"center"}}>
              <div style={{fontSize:28,marginBottom:6}}>{b.icon}</div><div style={{fontSize:16,fontWeight:700}}>{b.label}</div><div style={{fontSize:10,color:C.text3,marginTop:4}}>多码批量录入</div>{!isAdmin&&<div style={{fontSize:9,color:C.text3,marginTop:2}}>🔒 需要权限</div>}
            </button>
          ))}
        </div>

          :<div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,overflow:"hidden"}}>

                <div style={{display:"flex",gap:12,alignItems:"center"}}>
                  {sh?.photoUrl?<img src={sh.photoUrl} alt="" style={{width:40,height:40,objectFit:"cover",borderRadius:8,border:`1px solid ${C.border}`,flexShrink:0}}/>:<div style={{width:40,height:40,borderRadius:9,background:isIn?C.greenBg:C.redBg,border:`1px solid ${isIn?C.greenBd:C.redBd}`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,color:isIn?C.green:C.red,flexShrink:0}}>{isIn?"↑":"↓"}</div>}
                  <div><div style={{fontSize:13,fontWeight:600}}>{sh?`${sh.brand} ${sh.name}`:"已删除"} <span style={{color:C.text3,fontSize:12}}>{l.size}码</span></div>{l.note&&<div style={{fontSize:10,color:C.text3,marginTop:1}}>{l.note}</div>}<div style={{fontSize:10,color:C.text3,marginTop:1}}>{fmtTime(l.time)}</div></div>

                  {isAdmin&&<button onClick={()=>deleteLog(l.id)} style={{background:C.redBg,border:`1px solid ${C.redBd}`,borderRadius:7,padding:"4px 8px",color:C.red,fontSize:11,cursor:"pointer",fontWeight:600}}>删除</button>}
                </div>
              </div>
            );})}
          </div>
        }
      </div>
    );

  // ───────── 流水页 ─────────
  function PageLogs(){
    return(
      <div>
        <div className="page-header"><div><div className="page-title">流水记录</div><div className="page-subtitle">共 {logs.length} 条记录</div></div></div>

                  <div style={{fontSize:12}}><span style={{color:C.green,fontWeight:600}}>↑{din}</span><span style={{color:C.border2,margin:"0 8px"}}>·</span><span style={{color:C.red,fontWeight:600}}>↓{dout}</span></div>

                {isMobile?(
                  <div style={{display:"flex",flexDirection:"column",gap:5}}>
                    {dl.map(l=>{const sh=shoeById[l.shoeId];const isIn=l.type==="in";return(
                      <div key={l.id} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"9px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{color:isIn?C.green:C.red,fontSize:13}}>{isIn?"↑":"↓"}</span><div><span style={{fontSize:12,fontWeight:500}}>{sh?`${sh.brand} ${sh.name}`:"已删除"}</span><span style={{fontSize:11,color:C.text3,marginLeft:6}}>{l.size}码</span>{l.note&&<span style={{fontSize:10,color:C.text3,marginLeft:6}}>{l.note}</span>}</div></div>
                        <div style={{display:"flex",alignItems:"center",gap:8}}>
                          <div style={{textAlign:"right"}}><div style={{fontSize:14,fontWeight:700,color:isIn?C.green:C.red}}>{isIn?"+":"-"}{l.qty}</div><div style={{fontSize:9,color:C.text3}}>{fmtTime(l.time)}</div></div>
                          {isAdmin&&<button onClick={()=>deleteLog(l.id)} style={{background:C.redBg,border:`1px solid ${C.redBd}`,borderRadius:7,padding:"4px 8px",color:C.red,fontSize:11,cursor:"pointer",fontWeight:600}}>删除</button>}
                        </div>
                      </div>
                    );})}
                  </div>
                ):(
                  <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,overflow:"hidden"}}>
                    <table className="log-table">
                      <thead><tr><th>款式</th><th>类型</th><th>尺码</th><th>数量</th><th>备注</th><th>时间</th>{isAdmin&&<th></th>}</tr></thead>

  function PageSettings(){

      if(!isAdmin){setPwMsg({text:"需要先登录管理员",type:"err"});return;}

      if(newPw.length<4){setPwMsg({text:"新密码至少4位",type:"err"});return;}
      if(newPw!==newPw2){setPwMsg({text:"两次密码不一致",type:"err"});return;}
      setAdminPw(newPw);saveLS(KEY_PW,newPw);setOldPw("");setNewPw("");setNewPw2("");
      setPwMsg({text:"✓ 密码已更新",type:"ok"});setTimeout(()=>setPwMsg(null),3000);
    }
    function saveThresh(){
      const v=parseInt(threshInput);
      if(isNaN(v)||v<1||v>20){showToast("请输入1-20之间的数字","err");return;}
      setLowThresh(v);saveLS(KEY_THRESH,v);showToast(`✓ 预警阈值已设为 ${v} 双`);

            <div><div style={{fontSize:10,color:C.text3,marginBottom:5}}>新密码</div><input type="password" value={newPw} onChange={e=>setNewPw(e.target.value)} placeholder="至少4位" style={sinp}/></div>
            <div><div style={{fontSize:10,color:C.text3,marginBottom:5}}>确认新密码</div><input type="password" value={newPw2} onChange={e=>setNewPw2(e.target.value)} placeholder="再次输入" style={sinp}/></div>

        </div>

        {/* 低库存阈值 */}
        <div className="settings-section">
          <div className="settings-section-title">📊 库存预警阈值</div>

            <div style={{display:"flex",gap:8,alignItems:"center"}}>
              <input type="number" min="1" max="20" value={threshInput} onChange={e=>setThreshInput(e.target.value)} style={{width:70,background:"#fff",border:`1px solid ${C.border2}`,borderRadius:8,padding:"7px 10px",fontSize:14,fontWeight:700,outline:"none",textAlign:"center"}}/>

            </div>
          </div>
          <div style={{display:"flex",gap:10,marginTop:14,flexWrap:"wrap"}}>
            {[{color:C.green,bg:C.greenBg,bd:C.greenBd,label:`> ${lowThresh} 双`,desc:"正常"},{color:C.yellow,bg:C.yellowBg,bd:C.yellowBd,label:`1–${lowThresh} 双`,desc:"低库存"},{color:C.red,bg:C.redBg,bd:C.redBd,label:"0 双",desc:"断码"}].map(item=>(

        </div>

        {/* 数据备份 */}
        <div className="settings-section">

        {/* 系统信息 */}

          </div>
        </div>
      </div>
    );
  }

              </div>
              <div style={{display:"grid",gridTemplateColumns:`repeat(${SIZES.length},1fr)`,gap:4,marginBottom:16}}>{SIZES.map(sz=><SzCell key={sz} qty={inv[shoe.id]?.[sz]||0} sz={sz}/>)}</div>
              {isAdmin&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:20}}>
                <button onClick={()=>{setDetailShoe(null);openBatch("in",shoe.id);}} style={{background:C.greenBg,border:`1px solid ${C.greenBd}`,borderRadius:10,padding:12,color:C.green,fontSize:13,fontWeight:700,cursor:"pointer"}}>↑ 入仓</button>
                <button onClick={()=>{setDetailShoe(null);openBatch("out",shoe.id);}} style={{background:C.redBg,border:`1px solid ${C.redBd}`,borderRadius:10,padding:12,color:C.red,fontSize:13,fontWeight:700,cursor:"pointer"}}>↓ 出仓</button>
              </div>}
              <div style={{fontSize:9,color:C.text3,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>进出流水 · {shoeLogs.length} 条</div>
              {shoeLogs.length===0?<div style={{color:C.text3,fontSize:13,padding:"16px 0",textAlign:"center"}}>暂无流水记录</div>:shoeLogs.map(l=>{const isIn=l.type==="in";return(<div key={l.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:`1px solid ${C.border}`}}><div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{color:isIn?C.green:C.red,fontSize:13}}>{isIn?"↑":"↓"}</span><div><div style={{fontSize:12}}>{l.size}码 {l.note&&<span style={{color:C.text3}}>· {l.note}</span>}</div><div style={{fontSize:9,color:C.text3}}>{l.date} {fmtTime(l.time)}</div></div></div><div style={{fontSize:16,fontWeight:700,color:isIn?C.green:C.red}}>{isIn?"+":"-"}{l.qty}</div></div>);})}
              <button onClick={()=>setDetailShoe(null)} style={{width:"100%",marginTop:16,background:C.bg,border:`1px solid ${C.border2}`,borderRadius:12,padding:13,color:C.text2,fontSize:14,cursor:"pointer"}}>关闭</button>
            </div>
          </div>
        );
      })()}

      {shoeModal&&(
        <div style={modalWrap(isMobile)}>
          <div className={isMobile?"slide-up":"zoom-in"} style={{...modalBox(isMobile),maxWidth:440}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}><div style={{fontSize:15,fontWeight:700}}>{shoeModal==="add"?"+ 新增款式":"编辑款式"}</div><button onClick={()=>setShoeModal(null)} style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.text3}}>×</button></div>
            {[{key:"brand",label:"品牌",ph:"Nike / Adidas / New Balance..."},{key:"name",label:"款式名称",ph:"Air Max / Stan Smith..."},{key:"color",label:"颜色",ph:"黑色 / 白色 / 灰色..."}].map(f=>(<div key={f.key} style={{marginBottom:14}}><div style={{fontSize:10,color:C.text3,marginBottom:6}}>{f.label}</div><input value={shoeForm[f.key]} onChange={e=>setShoeForm({...shoeForm,[f.key]:e.target.value})} placeholder={f.ph} style={{...inp}}/></div>))}
            <div style={{fontSize:10,color:C.text3,marginBottom:16,padding:"10px 12px",background:C.bg,borderRadius:8,border:`1px solid ${C.border}`}}>📷 保存后在款式卡片上点击图片区域上传，图片同步给所有人</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <button onClick={()=>setShoeModal(null)} style={{background:C.bg,border:`1px solid ${C.border2}`,borderRadius:12,padding:14,color:C.text2,fontSize:14,cursor:"pointer"}}>取消</button>
              <button onClick={submitShoe} style={{background:C.accent,border:"none",borderRadius:12,padding:14,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>保存</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
