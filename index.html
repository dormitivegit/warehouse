<body>
<div id="root"></div>
<script type="text/babel">
const{useState,useCallback,useRef,useEffect,useMemo,createContext,useContext}=React;

// ═══════════════════════════════════════════════
// 安全改进：密码哈希工具
// ═══════════════════════════════════════════════
async function hashPassword(pw){
  const enc=new TextEncoder().encode(pw+"_wms_salt_2024");
  const buf=await crypto.subtle.digest("SHA-256",enc);
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,"0")).join("");
}

// ═══════════════════════════════════════════════
// 配置 — 运行时注入，不再硬编码
// ═══════════════════════════════════════════════
const CLOUD_CONFIG=(()=>{
  // 安全改进：从 URL hash 或 meta 标签读取配置
  // 部署时在 URL 后加 #binId=xxx&masterKey=xxx
  // 或者设置 <meta name="wms-bin-id" content="xxx">
  const params=new URLSearchParams(window.location.hash.slice(1));
  const metaBin=document.querySelector('meta[name="wms-bin-id"]')?.content;
  const metaKey=document.querySelector('meta[name="wms-master-key"]')?.content;
  return{
    binId:params.get("binId")||metaBin||"",
    masterKey:params.get("masterKey")||metaKey||""
  };
})();
const CLOUD_ON=!!CLOUD_CONFIG.binId&&!!CLOUD_CONFIG.masterKey;

const CDN_CONFIG=(()=>{
  const params=new URLSearchParams(window.location.hash.slice(1));
  const metaName=document.querySelector('meta[name="wms-cdn-name"]')?.content;
  const metaPreset=document.querySelector('meta[name="wms-cdn-preset"]')?.content;
  return{
    cloudName:params.get("cdnName")||metaName||"",
    uploadPreset:params.get("cdnPreset")||metaPreset||""
  };
})();
const CDN_ON=!!CDN_CONFIG.cloudName&&!!CDN_CONFIG.uploadPreset;

// ═══════════════════════════════════════════════
// 常量与 localStorage Key
// ═══════════════════════════════════════════════
const DEFAULT_SIZES=[36,37,38,39,40,41,42,43,44];
const KEY_SHOES="wms_shoes_v4",KEY_LOGS="wms_logs_v4",KEY_PW_HASH="wms_pwh_v2",KEY_THRESH="wms_thresh_v2",KEY_SIZES="wms_sizes_v1",KEY_CHECKS="wms_checks_v1";
// 旧版 key（用于自动迁移）
const OLD_KEY_SHOES="wms_shoes_v3",OLD_KEY_LOGS="wms_logs_v3",OLD_KEY_THRESH="wms_thresh_v1";
const DEFAULT_PW_HASH=null; // 首次使用时会提示设置密码
const DEFAULT_SHOES=[
  {id:"1",brand:"Nike",name:"Air Max",color:"黑色",photoUrl:""},
  {id:"2",brand:"Nike",name:"Air Force 1",color:"白色",photoUrl:""},
  {id:"3",brand:"Adidas",name:"Stan Smith",color:"白色",photoUrl:""},
  {id:"4",brand:"Adidas",name:"Superstar",color:"黑白",photoUrl:""},
  {id:"5",brand:"New Balance",name:"574",color:"灰色",photoUrl:""},
  {id:"6",brand:"Vans",name:"Old Skool",color:"黑白",photoUrl:""},
  {id:"7",brand:"Converse",name:"Chuck 70",color:"白色",photoUrl:""},
];

// ═══════════════════════════════════════════════
// 工具函数
// ═══════════════════════════════════════════════
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}
function todayStr(){return new Date().toISOString().slice(0,10);}
function fmtTime(iso){return new Date(iso).toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"});}
function fmtDate(d){return new Date(d+"T12:00:00").toLocaleDateString("zh-CN",{month:"2-digit",day:"2-digit",weekday:"short"});}
function loadLS(key,def){try{const v=localStorage.getItem(key);return v?JSON.parse(v):def;}catch{return def;}}
function saveLS(key,val){try{localStorage.setItem(key,JSON.stringify(val));}catch{}}

// ═══════════════════════════════════════════════
// 数据迁移：从旧版 v3 自动迁移到 v4
// ═══════════════════════════════════════════════
function migrateFromV3(){
  // 如果新版已有数据，不迁移
  if(localStorage.getItem(KEY_SHOES))return;
  // 检查旧版是否有数据
  const oldShoes=localStorage.getItem(OLD_KEY_SHOES);
  const oldLogs=localStorage.getItem(OLD_KEY_LOGS);
  if(!oldShoes&&!oldLogs)return;
  // 迁移
  console.log("[WMS] 检测到旧版数据，正在自动迁移...");
  if(oldShoes)localStorage.setItem(KEY_SHOES,oldShoes);
  if(oldLogs)localStorage.setItem(KEY_LOGS,oldLogs);
  const oldThresh=localStorage.getItem(OLD_KEY_THRESH);
  if(oldThresh)localStorage.setItem(KEY_THRESH,oldThresh);
  console.log("[WMS] 迁移完成！旧数据已保留作为备份。");
}
migrateFromV3();

// ═══════════════════════════════════════════════
// 云同步（改进：乐观锁版本号）
// ═══════════════════════════════════════════════
let _cloudVersion=0;
async function cloudFetch(){
  const res=await fetch(`https://api.jsonbin.io/v3/b/${CLOUD_CONFIG.binId}/latest`,{headers:{"X-Master-Key":CLOUD_CONFIG.masterKey}});
  if(!res.ok)throw new Error("fetch failed");
  const data=await res.json();
  const rec=data.record||{};
  _cloudVersion=rec._version||0;
  return rec;
}
async function cloudSave(record){
  // 乐观锁：带版本号，检测冲突
  const newRec={...record,_version:_cloudVersion+1,_lastModified:new Date().toISOString()};
  const res=await fetch(`https://api.jsonbin.io/v3/b/${CLOUD_CONFIG.binId}`,{method:"PUT",headers:{"Content-Type":"application/json","X-Master-Key":CLOUD_CONFIG.masterKey,"X-Bin-Versioning":"false"},body:JSON.stringify(newRec)});
  if(!res.ok)throw new Error("save failed");
  _cloudVersion=newRec._version;
}

// ═══════════════════════════════════════════════
// 图片上传
// ═══════════════════════════════════════════════
async function uploadToCloudinary(file){
  if(!CDN_ON)throw new Error("图片上传未配置");
  const blob=await new Promise(resolve=>{const reader=new FileReader();reader.onload=e=>{const img=new Image();img.onload=()=>{const MAX=800;let w=img.width,h=img.height;if(w>h){if(w>MAX){h=Math.round(h*MAX/w);w=MAX;}}else{if(h>MAX){w=Math.round(w*MAX/h);h=MAX;}}const canvas=document.createElement("canvas");canvas.width=w;canvas.height=h;canvas.getContext("2d").drawImage(img,0,0,w,h);canvas.toBlob(b=>resolve(b),"image/jpeg",0.82);};img.src=e.target.result;};reader.readAsDataURL(file);});
  const fd=new FormData();fd.append("file",blob);fd.append("upload_preset",CDN_CONFIG.uploadPreset);fd.append("folder","wms_shoes");
  const res=await fetch(`https://api.cloudinary.com/v1_1/${CDN_CONFIG.cloudName}/image/upload`,{method:"POST",body:fd});
  if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e.error?.message||"上传失败");}
  const data=await res.json();
  return data.secure_url.replace("/upload/","/upload/c_fill,w_400,h_400,q_auto,f_auto/");
}

// ═══════════════════════════════════════════════
// 库存计算（带缓存）
// ═══════════════════════════════════════════════
function buildInv(shoes,logs,sizes){
  const inv={};
  shoes.forEach(s=>{inv[s.id]={};sizes.forEach(sz=>{inv[s.id][sz]=0;});});
  // 只遍历有效日志（非冲正的或冲正本身）
  logs.forEach(l=>{
    if(inv[l.shoeId]&&inv[l.shoeId][l.size]!==undefined){
      if(l.type==="in")inv[l.shoeId][l.size]+=l.qty;
      else if(l.type==="out")inv[l.shoeId][l.size]-=l.qty;
      else if(l.type==="reverse-in")inv[l.shoeId][l.size]-=l.qty;
      else if(l.type==="reverse-out")inv[l.shoeId][l.size]+=l.qty;
      else if(l.type==="check-adjust")inv[l.shoeId][l.size]+=l.qty; // 盘点调整，qty 可正可负
    }
  });
  return inv;
}

// ═══════════════════════════════════════════════
// 颜色系统
// ═══════════════════════════════════════════════
const C={bg:"#f5f5f0",surface:"#ffffff",border:"#e8e8e2",border2:"#d8d8d0",text:"#1a1a1a",text2:"#666660",text3:"#999990",green:"#16a34a",greenBg:"#f0fdf4",greenBd:"#bbf7d0",red:"#dc2626",redBg:"#fef2f2",redBd:"#fecaca",yellow:"#d97706",yellowBg:"#fffbeb",yellowBd:"#fde68a",accent:"#2563eb",accentBg:"#eff6ff",accentBd:"#bfdbfe",purple:"#7c3aed",purpleBg:"#f5f3ff",purpleBd:"#ddd6fe"};
const inp={width:"100%",background:"#fff",border:`1px solid ${C.border2}`,borderRadius:10,padding:"11px 14px",color:C.text,fontSize:14,outline:"none",boxSizing:"border-box"};

function getSzColor(qty,thresh){return qty===0?C.red:qty<=thresh?C.yellow:C.green;}
function getSzBg(qty,thresh){return qty===0?C.redBg:qty<=thresh?C.yellowBg:C.greenBg;}
function getSzBd(qty,thresh){return qty===0?C.redBd:qty<=thresh?C.yellowBd:C.greenBd;}

// ═══════════════════════════════════════════════
// Error Boundary（错误边界）
// ═══════════════════════════════════════════════
class ErrorBoundary extends React.Component{
  constructor(props){super(props);this.state={error:null};}
  static getDerivedStateFromError(error){return{error};}
  render(){
    if(this.state.error)return React.createElement("div",{style:{padding:40,textAlign:"center"}},
      React.createElement("div",{style:{fontSize:48,marginBottom:16}},"⚠"),
      React.createElement("h2",{style:{marginBottom:8,color:C.red}},"系统出现异常"),
      React.createElement("p",{style:{color:C.text3,marginBottom:16}},this.state.error.message),
      React.createElement("button",{onClick:()=>{this.setState({error:null});},style:{background:C.accent,color:"#fff",border:"none",borderRadius:10,padding:"10px 24px",cursor:"pointer",fontWeight:700}},"刷新重试")
    );
    return this.props.children;
  }
}

// ═══════════════════════════════════════════════
// Modal 滚动锁定 Hook
// ═══════════════════════════════════════════════
function useBodyScrollLock(isOpen){
  useEffect(()=>{
    if(isOpen){document.body.classList.add("modal-open");}
    else{document.body.classList.remove("modal-open");}
    return()=>document.body.classList.remove("modal-open");
  },[isOpen]);
}

// ═══════════════════════════════════════════════
// 子组件（提取到 App 外部，避免重复创建）
// ═══════════════════════════════════════════════
function SzCell({qty,sz,compact,thresh=3}){
  const col=getSzColor(qty,thresh),bg=getSzBg(qty,thresh),bd=getSzBd(qty,thresh);
  return(<div style={{background:bg,border:`1px solid ${bd}`,borderRadius:compact?6:8,padding:compact?"4px 2px":"7px 2px",textAlign:"center"}} role="cell" aria-label={`${sz}码 库存${qty}双`}><div style={{fontSize:compact?7:8,color:C.text3,marginBottom:compact?1:3}}>{sz}</div><div style={{fontSize:compact?11:14,fontWeight:800,color:col,lineHeight:1}}>{qty}</div></div>);
}

function SyncBadge({syncStatus,lastSync,pullCloud}){
  const base={fontSize:10,display:"flex",alignItems:"center",gap:4};
  if(syncStatus==="offline")return<div style={{...base,color:C.text3}} role="status"><span aria-hidden="true">💾</span><span>本地模式</span></div>;
  if(syncStatus==="syncing")return<div style={{...base,color:C.accent}} role="status"><span className="spin" aria-hidden="true">↻</span><span>同步中</span></div>;
  if(syncStatus==="ok")return<div style={{...base,color:C.green,cursor:"pointer"}} onClick={pullCloud} role="status" tabIndex={0} aria-label="已同步，点击刷新"><span aria-hidden="true">✓</span><span>已同步 {lastSync}</span></div>;
  if(syncStatus==="error")return<div style={{...base,color:C.red,cursor:"pointer"}} onClick={pullCloud} role="status" tabIndex={0} aria-label="同步失败，点击重试"><span aria-hidden="true">⚠</span><span>同步失败 点击重试</span></div>;
  return null;
}

function PhotoBox({shoe,size:boxSize=110,rounded=false,isAdmin,uploadState,onUpload,onRemove,onZoom}){
  const ref=useRef();const url=shoe?.photoUrl||"";const sid=shoe?.id;const st=uploadState?.[sid];const r=rounded?12:0;
  return(
    <div style={{width:boxSize,height:boxSize,flexShrink:0,position:"relative",background:"#f8f8f5",borderRadius:r,overflow:"hidden"}} onClick={e=>e.stopPropagation()}>
      {url?(
        <>
          <img src={url} alt={`${shoe?.brand} ${shoe?.name}`} loading="lazy" style={{width:boxSize,height:boxSize,objectFit:"cover",display:"block",borderRadius:r}} onError={e=>{e.target.style.display="none";e.target.nextSibling&&(e.target.nextSibling.style.display="flex");}}/>
          <div style={{width:boxSize,height:boxSize,display:"none",alignItems:"center",justifyContent:"center",position:"absolute",top:0,left:0,background:"#f8f8f5",fontSize:Math.round(boxSize*0.32),color:C.text3}}>👟</div>
          <button onClick={e=>{e.stopPropagation();onZoom?.(url);}} aria-label="查看大图" style={{position:"absolute",bottom:6,right:6,width:24,height:24,borderRadius:7,background:"rgba(0,0,0,0.55)",border:"1.5px solid rgba(255,255,255,0.7)",color:"#fff",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",lineHeight:1}}>⤢</button>
          {isAdmin&&<button onClick={e=>{e.stopPropagation();onRemove?.(sid);}} aria-label="删除图片" style={{position:"absolute",top:6,right:6,width:22,height:22,borderRadius:"50%",background:"rgba(220,38,38,0.9)",border:"2px solid #fff",color:"#fff",fontSize:13,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700,lineHeight:1}}>×</button>}
        </>
      ):st==="uploading"?(
        <div style={{width:boxSize,height:boxSize,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:6,background:"#f0f4ff"}}><span className="spin" style={{fontSize:22,color:C.accent}} aria-hidden="true">↻</span><span style={{fontSize:10,color:C.accent}}>上传中…</span></div>
      ):isAdmin?(
        <div className="photo-upload" onClick={e=>{e.stopPropagation();ref.current?.click();}} role="button" tabIndex={0} aria-label="上传图片" style={{width:boxSize,height:boxSize,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",cursor:"pointer",gap:5,border:`1.5px dashed ${st==="error"?C.red:C.border2}`,background:st==="error"?"#fff5f5":"#fafaf8"}}>
          <span style={{fontSize:Math.round(boxSize*0.27),color:st==="error"?C.red:C.text3}} aria-hidden="true">{st==="error"?"⚠":"📷"}</span>
          <span style={{fontSize:10,color:st==="error"?C.red:C.text3,textAlign:"center",padding:"0 4px"}}>{st==="error"?"上传失败":"点击上传"}</span>
        </div>
      ):(
        <div style={{width:boxSize,height:boxSize,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:5}} aria-label="无图片"><span style={{fontSize:Math.round(boxSize*0.32),color:C.text3}} aria-hidden="true">👟</span></div>
      )}
      {isAdmin&&<input ref={ref} type="file" accept="image/*" style={{display:"none"}} aria-hidden="true" onChange={e=>{if(e.target.files[0])onUpload?.(sid,e.target.files[0]);e.target.value="";}}/>}
    </div>
  );
}

// ─── 分页 Hook ───
function usePagination(items,perPage=20){
  const[page,setPage]=useState(1);
  const totalPages=Math.ceil(items.length/perPage);
  const paged=items.slice((page-1)*perPage,page*perPage);
  useEffect(()=>{if(page>totalPages&&totalPages>0)setPage(totalPages);},[page,totalPages]);
  return{page,setPage,totalPages,paged};
}

function Pagination({page,totalPages,setPage}){
  if(totalPages<=1)return null;
  return(
    <div className="pagination" role="navigation" aria-label="翻页">
      <button disabled={page<=1} onClick={()=>setPage(p=>p-1)} aria-label="上一页">‹</button>
      {Array.from({length:Math.min(totalPages,7)},(_,i)=>{
        let p;
        if(totalPages<=7)p=i+1;
        else if(page<=4)p=i+1;
        else if(page>=totalPages-3)p=totalPages-6+i;
        else p=page-3+i;
        return<button key={p} className={p===page?"active":""} onClick={()=>setPage(p)}>{p}</button>;
      })}
      <button disabled={page>=totalPages} onClick={()=>setPage(p=>p+1)} aria-label="下一页">›</button>
    </div>
  );
}

// ─── 简易趋势图组件 ───
function TrendChart({data,width="100%",height=160,barColor=C.accent}){
  if(!data||!data.length)return<div style={{textAlign:"center",color:C.text3,padding:30,fontSize:12}}>暂无数据</div>;
  const max=Math.max(...data.map(d=>d.value),1);
  return(
    <div style={{width,height,display:"flex",alignItems:"flex-end",gap:2,padding:"0 4px"}} role="img" aria-label="趋势图">
      {data.map((d,i)=>(
        <div key={i} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
          <div className="chart-bar" style={{width:"100%",maxWidth:40,height:`${Math.max((d.value/max)*120,d.value>0?4:0)}px`,background:barColor,borderRadius:"4px 4px 0 0"}}/>
          <div style={{fontSize:8,color:C.text3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",maxWidth:"100%"}}>{d.label}</div>
        </div>
      ))}
    </div>
  );
}

// ═══════════════════════════════════════════════
// 主应用
// ═══════════════════════════════════════════════
function App(){

  const[shoes,setShoes]=useState(()=>loadLS(KEY_SHOES,DEFAULT_SHOES));

  const[pwHash,setPwHash]=useState(()=>loadLS(KEY_PW_HASH,null));

  const[batchModal,setBatchModal]=useState(null);

  const[shoeForm,setShoeForm]=useState({brand:"",name:"",color:""});
  const[detailShoe,setDetailShoe]=useState(null);
  const[checkModal,setCheckModal]=useState(null);
  const[checkForm,setCheckForm]=useState({});
  const[syncStatus,setSyncStatus]=useState(CLOUD_ON?"idle":"offline");
  const[lastSync,setLastSync]=useState(null);
  const[zoomPhoto,setZoomPhoto]=useState(null);
  const[uploadState,setUploadState]=useState({});
  const[toast,setToast]=useState(null);
  const[keyword,setKeyword]=useState("");
  const[sortBy,setSortBy]=useState("default");
  const[flashIds,setFlashIds]=useState({});
  const saveTimer=useRef(null);

  // ─── 模态框滚动锁定 ───
  useBodyScrollLock(!!batchModal||!!detailShoe||!!shoeModal||!!pwModal||!!zoomPhoto||!!checkModal);

  useEffect(()=>{const h=()=>setIsMobile(window.innerWidth<=768);window.addEventListener("resize",h);return()=>window.removeEventListener("resize",h);},[]);

  function showToast(msg,type="ok"){setToast({msg,type});setTimeout(()=>setToast(null),2600);}

  // ─── 安全改进：密码验证 ───
  function requireAdmin(action){
    if(isAdmin){action();return;}
    if(!pwHash){
      // 首次使用，需要设置密码
      setSetupMode(true);setPwInput("");setPwError(false);setPwModal({action});
    }else{
      setPwInput("");setPwError(false);setSetupMode(false);setPwModal({action});
    }
  }
  async function submitPassword(){
    if(setupMode){
      // 设置新密码
      if(pwInput.length<4){setPwError(true);setPwInput("");return;}
      const h=await hashPassword(pwInput);
      setPwHash(h);saveLS(KEY_PW_HASH,h);
      setIsAdmin(true);setSetupMode(false);
      const act=pwModal?.action;setPwModal(null);setPwInput("");setPwError(false);
      showToast("✓ 管理密码已设置");
      if(act)act();
    }else{
      const h=await hashPassword(pwInput);
      if(h===pwHash){
        setIsAdmin(true);
        const act=pwModal?.action;setPwModal(null);setPwInput("");setPwError(false);
        if(act)act();
      }else{setPwError(true);setPwInput("");}
    }
  }
  function logout(){setIsAdmin(false);showToast("已退出管理员");}

  // ─── 数据持久化 ───
  const persistLocal=useCallback((s,l)=>{saveLS(KEY_SHOES,s);saveLS(KEY_LOGS,l);},[]);
  const scheduleCloud=useCallback((s,l)=>{
    if(!CLOUD_ON)return;
    clearTimeout(saveTimer.current);setSyncStatus("syncing");
    saveTimer.current=setTimeout(async()=>{
      try{await cloudSave({shoes:s,logs:l});setSyncStatus("ok");setLastSync(new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"}));}
      catch{setSyncStatus("error");}
    },1200);
  },[]);

  const pullCloud=useCallback(async(quiet=false)=>{
    if(!CLOUD_ON)return;
    if(!quiet)setSyncStatus("syncing");
    try{
      const rec=await cloudFetch();
      if(rec&&rec.shoes&&rec.shoes.length>0){
        const ms=rec.shoes.map(s=>({photoUrl:"",...s}));
        setShoes(ms);saveLS(KEY_SHOES,ms);
        setLogs(rec.logs||[]);saveLS(KEY_LOGS,rec.logs||[]);
      }else{
        const ls=loadLS(KEY_SHOES,DEFAULT_SHOES),ll=loadLS(KEY_LOGS,[]);
        await cloudSave({shoes:ls,logs:ll});setShoes(ls);setLogs(ll);
      }
      setSyncStatus("ok");setLastSync(new Date().toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"}));
    }catch{setSyncStatus("error");}
  },[]);

  useEffect(()=>{if(!CLOUD_ON)return;pullCloud();const id=setInterval(()=>pullCloud(true),60000);const onFocus=()=>pullCloud(true);window.addEventListener("focus",onFocus);return()=>{clearInterval(id);window.removeEventListener("focus",onFocus);};},[pullCloud]);
  useEffect(()=>{const h=e=>{if(e.key==="Escape"){setZoomPhoto(null);setDetailShoe(null);setBatchModal(null);setShoeModal(null);setCheckModal(null);}};window.addEventListener("keydown",h);return()=>window.removeEventListener("keydown",h);},[]);

  function updateData(newShoes,newLogs,flashShoeId){
    if(newShoes!==null)setShoes(newShoes);
    if(newLogs!==null)setLogs(newLogs);
    const s=newShoes!==null?newShoes:shoes;
    const l=newLogs!==null?newLogs:logs;
    persistLocal(s,l);scheduleCloud(s,l);
    if(flashShoeId){setFlashIds(f=>({...f,[flashShoeId]:Date.now()}));setTimeout(()=>setFlashIds(f=>{const n={...f};delete n[flashShoeId];return n;}),800);}
  }

  // ─── useMemo 优化：库存等重计算 ───
  const inv=useMemo(()=>buildInv(shoes,logs,sizes),[shoes,logs,sizes]);
  const today=todayStr();
  const shoeById=useMemo(()=>{const m={};shoes.forEach(s=>{m[s.id]=s;});return m;},[shoes]);
  const shoeTotal=useCallback((id)=>sizes.reduce((a,sz)=>a+(inv[id]?.[sz]||0),0),[inv,sizes]);

  const todayLogs=useMemo(()=>logs.filter(l=>l.date===today),[logs,today]);
  const todayIn=useMemo(()=>todayLogs.filter(l=>l.type==="in").reduce((a,b)=>a+b.qty,0),[todayLogs]);
  const todayOut=useMemo(()=>todayLogs.filter(l=>l.type==="out").reduce((a,b)=>a+b.qty,0),[todayLogs]);
  const totalStock=useMemo(()=>shoes.reduce((s,sh)=>s+shoeTotal(sh.id),0),[shoes,shoeTotal]);
  const soldOutStyles=useMemo(()=>shoes.filter(sh=>sizes.some(sz=>(inv[sh.id]?.[sz]||0)===0)).length,[shoes,inv,sizes]);
  const lowStockStyles=useMemo(()=>shoes.filter(sh=>sizes.some(sz=>{const q=inv[sh.id]?.[sz]||0;return q>0&&q<=lowThresh;})).length,[shoes,inv,sizes,lowThresh]);

  const brandMap=useMemo(()=>{const m={};shoes.forEach(sh=>{if(!m[sh.brand])m[sh.brand]={total:0,shoes:[]};m[sh.brand].total+=shoeTotal(sh.id);m[sh.brand].shoes.push(sh);});return m;},[shoes,shoeTotal]);
  const sizeTotal=useMemo(()=>{const st={};sizes.forEach(sz=>{st[sz]=shoes.reduce((a,sh)=>a+(inv[sh.id]?.[sz]||0),0);});return st;},[shoes,inv,sizes]);

  const logsByDate=useMemo(()=>{const m={};logs.forEach(l=>{if(!m[l.date])m[l.date]=[];m[l.date].push(l);});return m;},[logs]);
  const sortedDates=useMemo(()=>Object.keys(logsByDate).sort((a,b)=>b.localeCompare(a)),[logsByDate]);

  const filteredShoes=useMemo(()=>shoes.filter(s=>`${s.brand}${s.name}${s.color}`.toLowerCase().includes(keyword.toLowerCase())),[shoes,keyword]);
  const sortedShoes=useMemo(()=>[...filteredShoes].sort((a,b)=>{
    if(sortBy==="stock-desc")return shoeTotal(b.id)-shoeTotal(a.id);
    if(sortBy==="stock-asc")return shoeTotal(a.id)-shoeTotal(b.id);
    if(sortBy==="brand")return a.brand.localeCompare(b.brand);
    if(sortBy==="soldout"){const sa=sizes.filter(sz=>(inv[a.id]?.[sz]||0)===0).length;const sb=sizes.filter(sz=>(inv[b.id]?.[sz]||0)===0).length;return sb-sa;}
    return 0;
  }),[filteredShoes,sortBy,shoeTotal,inv,sizes]);

  // ─── 报表数据 ───
  const last7Days=useMemo(()=>{
    const result=[];
    for(let i=6;i>=0;i--){
      const d=new Date();d.setDate(d.getDate()-i);
      const ds=d.toISOString().slice(0,10);
      const dl=logsByDate[ds]||[];
      result.push({
        date:ds,
        label:`${d.getMonth()+1}/${d.getDate()}`,
        in:dl.filter(l=>l.type==="in").reduce((a,b)=>a+b.qty,0),
        out:dl.filter(l=>l.type==="out").reduce((a,b)=>a+b.qty,0),
      });
    }
    return result;
  },[logsByDate]);

  // ─── 导出 ───
  function exportJSON(){
    const data={exportTime:new Date().toISOString(),version:2,shoes,logs,sizes,checks};
    const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`仓库备份_${todayStr()}.json`;a.click();URL.revokeObjectURL(url);showToast("✓ 备份已下载");
  }
  function exportCSV(){
    const rows=[["品牌","款式","颜色",...sizes.map(s=>s+"码"),"总计"]];
    shoes.forEach(sh=>{
      const row=[sh.brand,sh.name,sh.color,...sizes.map(sz=>inv[sh.id]?.[sz]||0)];
      row.push(shoeTotal(sh.id));
      rows.push(row);
    });
    const csv="\uFEFF"+rows.map(r=>r.join(",")).join("\n");
    const blob=new Blob([csv],{type:"text/csv;charset=utf-8"});
    const url=URL.createObjectURL(blob);const a=document.createElement("a");a.href=url;a.download=`库存表_${todayStr()}.csv`;a.click();URL.revokeObjectURL(url);showToast("✓ CSV已下载，可用Excel打开");
  }
  function importData(file){
    if(!file)return;const reader=new FileReader();
    reader.onload=e=>{
      try{
        const data=JSON.parse(e.target.result);
        if(!data.shoes||!data.logs)throw new Error("格式错误");
        if(!confirm(`确认导入？将覆盖现有数据。\n包含 ${data.shoes.length} 款鞋，${data.logs.length} 条记录。`))return;
        updateData(data.shoes,data.logs);
        if(data.sizes){setSizes(data.sizes);saveLS(KEY_SIZES,data.sizes);}
        if(data.checks){setChecks(data.checks);saveLS(KEY_CHECKS,data.checks);}
        showToast(`✓ 导入成功：${data.shoes.length}款 / ${data.logs.length}条`);
      }catch{showToast("❌ 文件格式错误","err");}
    };reader.readAsText(file);
  }

  // ─── 图片操作 ───
  async function handlePhotoUpload(shoeId,file){
    if(!file)return;
    setUploadState(s=>({...s,[shoeId]:"uploading"}));

      const url=await uploadToCloudinary(file);

      setUploadState(s=>({...s,[shoeId]:"done"}));showToast("✓ 图片上传成功");

    const entries=Object.entries(batchForm).filter(([k,v])=>!isNaN(parseInt(k))&&parseInt(v)>0);

    if(batchModal.type==="out"){

        const cur=inv[batchModal.shoeId]?.[parseInt(sz)]||0;

    const reverseType=log.type==="in"?"reverse-in":"reverse-out";

      if(diff!==0){
        adjustLogs.push({id:genId(),type:"check-adjust",shoeId:sid,size:sz,qty:diff,note:`盘点调整(系统${system}→实际${actual})`,date:today,time:new Date().toISOString()});

      }
    });
    if(!adjustLogs.length){showToast("库存无差异");setCheckModal(null);return;}
    const checkRecord={id:genId(),date:today,time:new Date().toISOString(),shoeId:sid,diffs};
    setChecks(prev=>{const nc=[checkRecord,...prev];saveLS(KEY_CHECKS,nc);return nc;});
    updateData(null,[...adjustLogs,...logs],sid);
    setCheckModal(null);showToast(`✓ 盘点完成，${adjustLogs.length} 码有差异`);

  // ═══════════════════════════════════════════════

  // ═══════════════════════════════════════════════
  const nav=[{key:"home",icon:"▦",label:"总览"},{key:"ops",icon:"⇅",label:"进出仓"},{key:"logs",icon:"≡",label:"流水"},{key:"report",icon:"◉",label:"报表"},{key:"shoes",icon:"◈",label:"款式管理"},{key:"settings",icon:"⚙",label:"设置"}];
  const modalWrap=(mobile)=>({position:"fixed",inset:0,background:"rgba(0,0,0,0.4)",display:"flex",alignItems:mobile?"flex-end":"center",justifyContent:"center",zIndex:100});
  const modalBox=(mobile)=>({background:C.surface,borderRadius:mobile?"20px 20px 0 0":20,width:"100%",maxWidth:520,margin:mobile?"0":"auto",padding:22,maxHeight:"92vh",overflowY:"auto",boxShadow:"0 -8px 40px rgba(0,0,0,0.12)"});

  // ─── 品牌折叠组件 ───
  function BrandSection(){
    const[expanded,setExpanded]=useState({});
    return(
      <div style={{display:"grid",gridTemplateColumns:isMobile?"1fr":"1fr 320px",gap:14,marginBottom:24,alignItems:"start"}}>
        <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:14,overflow:"hidden"}} role="region" aria-label="品牌库存">
          <div style={{padding:"14px 18px",borderBottom:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>

                  <div style={{display:"flex",alignItems:"center",gap:10}}>
                    <span style={{fontSize:13,fontWeight:700,color:C.text}}>{brand}</span>

                    {brandSoldOut&&<span style={{fontSize:9,color:C.red,background:C.redBg,border:`1px solid ${C.redBd}`,borderRadius:4,padding:"1px 5px",fontWeight:600}}>断码</span>}
                    {brandLow&&!brandSoldOut&&<span style={{fontSize:9,color:C.yellow,background:C.yellowBg,border:`1px solid ${C.yellowBd}`,borderRadius:4,padding:"1px 5px",fontWeight:600}}>低库</span>}

  function PageSettings(){
    const[newPw,setNewPw]=useState("");const[newPw2,setNewPw2]=useState("");const[oldPw,setOldPw]=useState("");const[pwMsg,setPwMsg]=useState(null);
    const[threshInput,setThreshInput]=useState(String(lowThresh));
    const[sizeInput,setSizeInput]=useState(sizes.join(", "));
    const importRef=useRef();
    const sinp={...inp,padding:"9px 12px",fontSize:13};

    async function changePw(){
      if(!isAdmin){setPwMsg({text:"需要先登录管理员",type:"err"});return;}
      const oldHash=await hashPassword(oldPw);
      if(oldHash!==pwHash){setPwMsg({text:"原密码错误",type:"err"});return;}
      if(newPw.length<4){setPwMsg({text:"新密码至少4位",type:"err"});return;}
      if(newPw!==newPw2){setPwMsg({text:"两次密码不一致",type:"err"});return;}
      const h=await hashPassword(newPw);setPwHash(h);saveLS(KEY_PW_HASH,h);setOldPw("");setNewPw("");setNewPw2("");
      setPwMsg({text:"✓ 密码已更新",type:"ok"});setTimeout(()=>setPwMsg(null),3000);
    }
    function saveThresh(){
      const v=parseInt(threshInput);if(isNaN(v)||v<1||v>20){showToast("请输入1-20之间的数字","err");return;}
      setLowThresh(v);saveLS(KEY_THRESH,v);showToast(`✓ 预警阈值已设为 ${v} 双`);
    }
    function saveSizes(){
      const parsed=sizeInput.split(/[,，\s]+/).map(s=>parseFloat(s.trim())).filter(n=>!isNaN(n)&&n>0);
      if(parsed.length<2){showToast("至少需要2个尺码","err");return;}
      const sorted=[...new Set(parsed)].sort((a,b)=>a-b);
      setSizes(sorted);saveLS(KEY_SIZES,sorted);setSizeInput(sorted.join(", "));showToast(`✓ 尺码已更新为 ${sorted.join(", ")}`);
    }

        {!pwHash&&<div style={{background:C.accentBg,border:`1px solid ${C.accentBd}`,borderRadius:10,padding:"10px 14px",fontSize:12,color:C.accent,fontWeight:600,marginBottom:14}}>ℹ 尚未设置密码，点击任意管理操作时将提示设置</div>}

          <div><div style={{fontSize:10,color:C.text3,marginBottom:5}}>新密码</div><input type="password" value={newPw} onChange={e=>setNewPw(e.target.value)} placeholder="至少4位" style={sinp}/></div>
          <div><div style={{fontSize:10,color:C.text3,marginBottom:5}}>确认新密码</div><input type="password" value={newPw2} onChange={e=>setNewPw2(e.target.value)} placeholder="再次输入" style={sinp}/></div>
        </div>
        {pwMsg&&<div style={{fontSize:12,color:pwMsg.type==="err"?C.red:C.green,fontWeight:600,marginBottom:10}}>{pwMsg.text}</div>}
        <button onClick={changePw} className="focus-ring" style={{background:C.accent,border:"none",borderRadius:10,padding:"9px 22px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer"}}>更新密码</button>
      </div>

      {/* 尺码配置（新增） */}
      <div className="settings-section">
        <div className="settings-section-title">👟 尺码配置</div>
        <div className="settings-row">
          <div style={{flex:1,marginRight:16}}><div className="settings-label">自定义尺码列表</div><div className="settings-desc">用逗号分隔，支持半码（如 42.5）。当前：{sizes.join(", ")}</div>
            <input value={sizeInput} onChange={e=>setSizeInput(e.target.value)} placeholder="36, 37, 38, 39, 40, 41, 42, 43, 44" style={{...sinp,marginTop:8}}/>
          </div>
          <button onClick={saveSizes} className="focus-ring" style={{background:C.accent,border:"none",borderRadius:8,padding:"8px 16px",color:"#fff",fontSize:12,fontWeight:700,cursor:"pointer",flexShrink:0,alignSelf:"flex-end"}}>保存</button>

      <div className="settings-section">

        <div style={{marginTop:14,padding:"12px 14px",background:C.bg,borderRadius:10,border:`1px solid ${C.border}`,fontSize:11,color:C.text3,lineHeight:1.7}}>
          📋 当前数据：<strong style={{color:C.text}}>{shoes.length} 款鞋</strong> · <strong style={{color:C.text}}>{logs.length} 条记录</strong> · <strong style={{color:C.text}}>{checks.length} 次盘点</strong><br/>

              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:14}}>
                {sizes.map(sz=>{const cur=inv[batchModal.shoeId]?.[sz]||0;const curCol=getSzColor(cur,lowThresh);return(
                  <div key={sz} style={{background:C.bg,border:`1px solid ${C.border}`,borderRadius:10,padding:"10px 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                    <div><div style={{fontSize:16,fontWeight:800,lineHeight:1}}>{sz}<span style={{fontSize:9,color:C.text3,marginLeft:2}}>码</span></div><div style={{fontSize:9,color:C.text3,marginTop:3}}>现有 <span style={{color:curCol,fontWeight:600}}>{cur}</span> 双</div></div>
                    <input type="number" min="0" value={batchForm[sz]||""} onChange={e=>setBatchForm({...batchForm,[sz]:e.target.value})} aria-label={`${sz}码数量`} placeholder="0" style={{width:50,background:"#fff",border:`1px solid ${C.border2}`,borderRadius:8,padding:"8px 6px",color:C.text,fontSize:17,fontWeight:800,outline:"none",textAlign:"center"}}/>
                  </div>
                );})}
              </div>
              <div style={{marginBottom:18}}><div style={{fontSize:10,color:C.text3,marginBottom:6}}>备注（可选）</div><input type="text" value={batchForm.note||""} onChange={e=>setBatchForm({...batchForm,note:e.target.value})} placeholder="如：供应商补货 / 门店出货..." aria-label="备注" style={{...inp}}/></div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <button onClick={()=>{setBatchModal(null);setBatchForm({});}} className="focus-ring" style={{background:"#f5f5f0",border:`1px solid ${C.border2}`,borderRadius:12,padding:14,color:C.text2,fontSize:14,cursor:"pointer"}}>取消</button>
                <button onClick={submitBatch} className="focus-ring" style={{background:isIn?C.green:C.red,border:"none",borderRadius:12,padding:14,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>确认{isIn?"入仓":"出仓"}{totalFill>0?` (${totalFill}双)`:""}</button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* 盘点弹窗（新增） */}
      {checkModal&&(()=>{
        const shoe=shoeById[checkModal.shoeId];const diffCount=sizes.filter(sz=>(parseInt(checkForm[sz])||0)!==(inv[checkModal.shoeId]?.[sz]||0)).length;
        return(
          <div style={modalWrap(isMobile)} role="dialog" aria-modal="true" aria-label="库存盘点">
            <div className={isMobile?"slide-up":"zoom-in"} style={modalBox(isMobile)}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div style={{fontSize:16,fontWeight:700,color:C.purple}}>☐ 库存盘点</div><button onClick={()=>setCheckModal(null)} aria-label="关闭" style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.text3}}>×</button></div>
              {shoe&&<div style={{marginBottom:14,padding:"10px 12px",background:C.bg,borderRadius:10,display:"flex",alignItems:"center",gap:10}}>
                {shoe.photoUrl?<img src={shoe.photoUrl} alt="" style={{width:44,height:44,objectFit:"cover",borderRadius:8}}/>:<div style={{width:44,height:44,borderRadius:8,background:"#f0f0ec",display:"flex",alignItems:"center",justifyContent:"center",fontSize:20}}>👟</div>}
                <div><div style={{fontSize:14,fontWeight:700}}>{shoe.brand} {shoe.name}</div><div style={{fontSize:11,color:C.text3}}>{shoe.color}</div></div>
              </div>}
              <div style={{fontSize:10,color:C.text3,marginBottom:10}}>请输入各码位实际库存数量（系统将自动计算差异）{diffCount>0&&<span style={{color:C.purple,fontWeight:600,marginLeft:6}}>{diffCount} 码有差异</span>}</div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,marginBottom:14}}>
                {sizes.map(sz=>{const sys=inv[checkModal.shoeId]?.[sz]||0;const actual=parseInt(checkForm[sz])||0;const hasDiff=actual!==sys;
                  return(
                    <div key={sz} style={{background:hasDiff?C.purpleBg:C.bg,border:`1px solid ${hasDiff?C.purpleBd:C.border}`,borderRadius:10,padding:"10px 12px"}}>
                      <div style={{fontSize:14,fontWeight:800,marginBottom:2}}>{sz}<span style={{fontSize:9,color:C.text3,marginLeft:2}}>码</span></div>
                      <div style={{fontSize:9,color:C.text3,marginBottom:6}}>系统 <span style={{fontWeight:600}}>{sys}</span> 双</div>
                      <input type="number" min="0" value={checkForm[sz]||""} onChange={e=>setCheckForm({...checkForm,[sz]:e.target.value})} aria-label={`${sz}码实际数量`} placeholder="0" style={{width:"100%",background:"#fff",border:`1px solid ${hasDiff?C.purpleBd:C.border2}`,borderRadius:8,padding:"7px 6px",color:C.text,fontSize:16,fontWeight:800,outline:"none",textAlign:"center"}}/>
                      {hasDiff&&<div style={{fontSize:9,color:C.purple,fontWeight:600,marginTop:3,textAlign:"center"}}>{actual-sys>0?"+":""}{actual-sys}</div>}
                    </div>
                  );
                })}
              </div>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                <button onClick={()=>setCheckModal(null)} className="focus-ring" style={{background:"#f5f5f0",border:`1px solid ${C.border2}`,borderRadius:12,padding:14,color:C.text2,fontSize:14,cursor:"pointer"}}>取消</button>
                <button onClick={submitCheck} className="focus-ring" style={{background:C.purple,border:"none",borderRadius:12,padding:14,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>确认盘点{diffCount>0?` (${diffCount}码差异)`:""}</button>
              </div>
            </div>
          </div>
        );
      })()}

      {/* 详情弹窗 */}
      {detailShoe&&(()=>{
        const shoe=shoes.find(s=>s.id===detailShoe.id)||detailShoe;const shoeLogs=logs.filter(l=>l.shoeId===shoe.id);const total=shoeTotal(shoe.id);const soldOut=sizes.filter(sz=>(inv[shoe.id]?.[sz]||0)===0);const low=sizes.filter(sz=>{const q=inv[shoe.id]?.[sz]||0;return q>0&&q<=lowThresh;});
        return(
          <div style={modalWrap(isMobile)} onClick={()=>setDetailShoe(null)} role="dialog" aria-modal="true" aria-label={`${shoe.brand} ${shoe.name} 详情`}>
            <div className={isMobile?"slide-up":"zoom-in"} style={{...modalBox(isMobile),maxWidth:540}} onClick={e=>e.stopPropagation()}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}><div style={{fontSize:17,fontWeight:800}}>{shoe.brand} {shoe.name}</div><button onClick={()=>setDetailShoe(null)} aria-label="关闭" style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.text3}}>×</button></div>
              <div style={{display:"flex",gap:16,alignItems:"flex-start",marginBottom:18}}>
                <PhotoBox shoe={shoe} size={100} rounded isAdmin={isAdmin} uploadState={uploadState} onUpload={handlePhotoUpload} onRemove={removePhoto} onZoom={setZoomPhoto}/>
                <div style={{flex:1}}><div style={{fontSize:12,color:C.text3}}>{shoe.color}</div><div style={{fontSize:28,fontWeight:800,marginTop:6}}>{total}<span style={{fontSize:12,color:C.text3,marginLeft:4}}>双</span></div>{soldOut.length>0&&<div style={{fontSize:11,color:C.red,marginTop:6,fontWeight:500}}>⚠ 断码：{soldOut.join(" / ")} 码</div>}{low.length>0&&!soldOut.length&&<div style={{fontSize:11,color:C.yellow,marginTop:6}}>▲ 低库存：{low.join(" / ")} 码</div>}</div>
              </div>
              <div style={{display:"grid",gridTemplateColumns:`repeat(${sizes.length},1fr)`,gap:4,marginBottom:16}}>{sizes.map(sz=><SzCell key={sz} qty={inv[shoe.id]?.[sz]||0} sz={sz} thresh={lowThresh}/>)}</div>
              {isAdmin&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8,marginBottom:20}}>
                <button onClick={()=>{setDetailShoe(null);openBatch("in",shoe.id);}} className="focus-ring" style={{background:C.greenBg,border:`1px solid ${C.greenBd}`,borderRadius:10,padding:12,color:C.green,fontSize:13,fontWeight:700,cursor:"pointer"}}>↑ 入仓</button>
                <button onClick={()=>{setDetailShoe(null);openBatch("out",shoe.id);}} className="focus-ring" style={{background:C.redBg,border:`1px solid ${C.redBd}`,borderRadius:10,padding:12,color:C.red,fontSize:13,fontWeight:700,cursor:"pointer"}}>↓ 出仓</button>
                <button onClick={()=>{setDetailShoe(null);openCheck(shoe.id);}} className="focus-ring" style={{background:C.purpleBg,border:`1px solid ${C.purpleBd}`,borderRadius:10,padding:12,color:C.purple,fontSize:13,fontWeight:700,cursor:"pointer"}}>☐ 盘点</button>
              </div>}
              <div style={{fontSize:9,color:C.text3,letterSpacing:2,textTransform:"uppercase",marginBottom:10}}>进出流水 · {shoeLogs.length} 条</div>
              {shoeLogs.length===0?<div style={{color:C.text3,fontSize:13,padding:"16px 0",textAlign:"center"}}>暂无流水记录</div>:shoeLogs.slice(0,20).map(l=>{const isIn=l.type==="in";const isReverse=l.type?.startsWith("reverse");const isAdjust=l.type==="check-adjust";return(<div key={l.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:`1px solid ${C.border}`,opacity:isReverse?0.6:1}}><div style={{display:"flex",gap:8,alignItems:"center"}}><span style={{color:isReverse?C.purple:isAdjust?C.accent:isIn?C.green:C.red,fontSize:13}} aria-hidden="true">{isReverse?"↩":isAdjust?"☐":isIn?"↑":"↓"}</span><div><div style={{fontSize:12}}>{l.size}码 {l.note&&<span style={{color:C.text3}}>· {l.note}</span>}</div><div style={{fontSize:9,color:C.text3}}>{l.date} {fmtTime(l.time)}</div></div></div><div style={{fontSize:16,fontWeight:700,color:isReverse?C.purple:isAdjust?C.accent:isIn?C.green:C.red}}>{(isIn||l.type==="reverse-out"||(isAdjust&&l.qty>0))?"+":"-"}{Math.abs(l.qty)}</div></div>);})}
              {shoeLogs.length>20&&<div style={{textAlign:"center",color:C.text3,fontSize:11,padding:"8px 0"}}>仅显示最近20条</div>}
              <button onClick={()=>setDetailShoe(null)} className="focus-ring" style={{width:"100%",marginTop:16,background:C.bg,border:`1px solid ${C.border2}`,borderRadius:12,padding:13,color:C.text2,fontSize:14,cursor:"pointer"}}>关闭</button>
            </div>
          </div>
        );
      })()}

      {/* 款式编辑弹窗 */}
      {shoeModal&&(
        <div style={modalWrap(isMobile)} role="dialog" aria-modal="true" aria-label={shoeModal==="add"?"新增款式":"编辑款式"}>
          <div className={isMobile?"slide-up":"zoom-in"} style={{...modalBox(isMobile),maxWidth:440}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}><div style={{fontSize:15,fontWeight:700}}>{shoeModal==="add"?"+ 新增款式":"编辑款式"}</div><button onClick={()=>setShoeModal(null)} aria-label="关闭" style={{background:"none",border:"none",fontSize:22,cursor:"pointer",color:C.text3}}>×</button></div>
            {[{key:"brand",label:"品牌",ph:"Nike / Adidas / New Balance..."},{key:"name",label:"款式名称",ph:"Air Max / Stan Smith..."},{key:"color",label:"颜色",ph:"黑色 / 白色 / 灰色..."}].map(f=>(<div key={f.key} style={{marginBottom:14}}><label style={{fontSize:10,color:C.text3,marginBottom:6,display:"block"}}>{f.label}</label><input value={shoeForm[f.key]} onChange={e=>setShoeForm({...shoeForm,[f.key]:e.target.value})} placeholder={f.ph} style={{...inp}}/></div>))}
            <div style={{fontSize:10,color:C.text3,marginBottom:16,padding:"10px 12px",background:C.bg,borderRadius:8,border:`1px solid ${C.border}`}}>📷 保存后在款式卡片上点击图片区域上传</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              <button onClick={()=>setShoeModal(null)} className="focus-ring" style={{background:C.bg,border:`1px solid ${C.border2}`,borderRadius:12,padding:14,color:C.text2,fontSize:14,cursor:"pointer"}}>取消</button>
              <button onClick={submitShoe} className="focus-ring" style={{background:C.accent,border:"none",borderRadius:12,padding:14,color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>保存</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(
  React.createElement(ErrorBoundary,null,React.createElement(App))
);
</script>
</body>
</html>
