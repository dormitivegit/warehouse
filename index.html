<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>仓库管理系统 - 优化版</title>
<!-- 云同步配置：轻量双人共用版。密钥会暴露在前端，适合私人小工具，不适合公开业务系统。 -->
<meta name="wms-bin-id" content="69a92606ae596e708f61143c">
<meta name="wms-master-key" content="$2a$10$3YSGRJC241CXsBpeivsTP.NHutZ7G.qgoZyFYBB2IJs4CX/OHeno.">
<meta name="wms-cdn-name" content="dvkf38yoa">
<meta name="wms-cdn-preset" content="wms_unsigned">
<style>
  :root{
    --bg:#f6f7f9;
    --panel:#ffffff;
    --panel-soft:#f9fafb;
    --line:#e5e7eb;
    --line-strong:#d1d5db;
    --text:#111827;
    --muted:#6b7280;
    --faint:#9ca3af;
    --blue:#2563eb;
    --blue-soft:#eff6ff;
    --green:#16a34a;
    --green-soft:#f0fdf4;
    --red:#dc2626;
    --red-soft:#fef2f2;
    --amber:#d97706;
    --amber-soft:#fffbeb;
    --violet:#7c3aed;
    --violet-soft:#f5f3ff;
    --shadow:0 16px 40px rgba(15,23,42,.08);
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif}
  button,input,select{font:inherit}
  button{cursor:pointer}
  button:disabled{opacity:.45;cursor:not-allowed}
  .app{min-height:100vh;display:grid;grid-template-columns:240px minmax(0,1fr)}
  .sidebar{position:sticky;top:0;height:100vh;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column}
  .brand{padding:24px 20px 18px;border-bottom:1px solid var(--line)}
  .brand small{display:block;color:var(--faint);letter-spacing:3px;text-transform:uppercase;font-size:10px;margin-bottom:4px}
  .brand strong{font-size:22px;letter-spacing:.5px}
  .nav{padding:12px;display:grid;gap:4px;flex:1}
  .nav button{border:0;background:transparent;color:var(--muted);border-radius:8px;padding:11px 12px;text-align:left;display:flex;align-items:center;gap:10px}
  .nav button:hover{background:var(--panel-soft);color:var(--text)}
  .nav button.active{background:var(--blue-soft);color:var(--blue);font-weight:700}
  .sidebar-foot{padding:14px 12px 18px;border-top:1px solid var(--line)}
  .main{max-width:1240px;width:100%;padding:28px 32px 96px}
  .mobile-bar{display:none}
  .page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px}
  .page-title{font-size:24px;font-weight:800;line-height:1.1}
  .page-subtitle{color:var(--muted);font-size:13px;margin-top:6px}
  .grid{display:grid;gap:14px}
  .stats{grid-template-columns:repeat(6,minmax(0,1fr));margin-bottom:18px}
  .stat{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:15px 16px;min-height:98px}
  .stat .label{font-size:11px;color:var(--muted);letter-spacing:.8px;margin-bottom:9px}
  .stat .value{font-size:30px;font-weight:850;line-height:1}
  .stat .hint{font-size:11px;color:var(--faint);margin-top:8px}
  .toolbar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:18px 0 14px}
  .search{position:relative;flex:1;min-width:240px}
  .search input{width:100%;padding:11px 14px 11px 36px;border:1px solid var(--line-strong);border-radius:8px;background:#fff;outline:none}
  .search span{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--faint)}
  .select,.input{border:1px solid var(--line-strong);border-radius:8px;background:#fff;padding:10px 12px;outline:none;min-height:42px}
  .btn{border:1px solid var(--line-strong);background:#fff;color:var(--text);border-radius:8px;padding:10px 14px;font-weight:700;display:inline-flex;align-items:center;justify-content:center;gap:8px;min-height:40px}
  .btn:hover{filter:brightness(.98)}
  .btn.primary{background:var(--blue);border-color:var(--blue);color:#fff}
  .btn.green{background:var(--green);border-color:var(--green);color:#fff}
  .btn.red{background:var(--red);border-color:var(--red);color:#fff}
  .btn.soft{background:var(--panel-soft)}
  .btn.small{padding:7px 10px;min-height:32px;font-size:12px}
  .btn.link{border:0;background:transparent;color:var(--blue);padding:4px;min-height:0}
  .products{grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:8px;overflow:hidden;box-shadow:none}
  .card:hover{box-shadow:var(--shadow)}
  .product-card{display:grid;grid-template-rows:auto 1fr}
  .product-main{display:flex;gap:14px;padding:14px;cursor:pointer}
  .photo{width:88px;height:88px;border-radius:8px;background:linear-gradient(135deg,#eef2ff,#f8fafc);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;color:var(--faint);font-weight:800;overflow:hidden;flex-shrink:0}
  .photo img{width:100%;height:100%;object-fit:cover;display:block}
  .product-title{font-weight:800;font-size:15px;line-height:1.3}
  .product-meta{font-size:12px;color:var(--muted);margin-top:4px}
  .product-total{font-size:30px;font-weight:850;margin-top:12px;line-height:1}
  .product-total small{font-size:12px;color:var(--faint);font-weight:600;margin-left:4px}
  .stock-grid{display:grid;grid-template-columns:repeat(var(--size-count),minmax(0,1fr));gap:4px}
  .stock-cell{border:1px solid var(--line);border-radius:6px;padding:6px 2px;text-align:center;background:var(--panel-soft);min-width:0}
  .stock-cell b{display:block;font-size:14px;line-height:1.1}
  .stock-cell span{display:block;font-size:9px;color:var(--muted);margin-bottom:3px;white-space:nowrap}
  .stock-cell.ok{background:var(--green-soft);border-color:#bbf7d0;color:var(--green)}
  .stock-cell.low{background:var(--amber-soft);border-color:#fde68a;color:var(--amber)}
  .stock-cell.zero{background:var(--red-soft);border-color:#fecaca;color:var(--red)}
  .product-stock{border-top:1px solid var(--line);padding:10px 12px 12px}
  .risk{font-size:11px;margin-top:8px;font-weight:700}
  .risk.red{color:var(--red)}
  .risk.amber{color:var(--amber)}
  .row-actions{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:18px}
  .ops-grid{grid-template-columns:repeat(3,minmax(0,220px));margin-bottom:18px}
  .op-card{min-height:126px;text-align:left;border-radius:8px;border:1px solid var(--line);background:#fff;padding:18px}
  .op-card strong{display:block;font-size:18px;margin-bottom:6px}
  .op-card span{color:var(--muted);font-size:12px}
  .log-list{display:grid;gap:10px}
  .log-day{margin-bottom:18px}
  .log-day-head{display:flex;justify-content:space-between;align-items:center;color:var(--muted);font-size:12px;font-weight:700;margin:0 2px 8px}
  .log-row{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:12px 14px;border-bottom:1px solid var(--line)}
  .log-row:last-child{border-bottom:0}
  .log-main{min-width:0}
  .log-title{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .log-note{font-size:11px;color:var(--muted);margin-top:3px}
  .qty{font-size:20px;font-weight:850;min-width:48px;text-align:right}
  .qty.in{color:var(--green)}
  .qty.out{color:var(--red)}
  .qty.rev{color:var(--violet)}
  .qty.adjust{color:var(--blue)}
  .badge{font-size:11px;border-radius:999px;padding:3px 8px;border:1px solid var(--line);background:var(--panel-soft);color:var(--muted);white-space:nowrap}
  .badge.blue{background:var(--blue-soft);border-color:#bfdbfe;color:var(--blue)}
  .badge.red{background:var(--red-soft);border-color:#fecaca;color:var(--red)}
  .badge.green{background:var(--green-soft);border-color:#bbf7d0;color:var(--green)}
  .badge.amber{background:var(--amber-soft);border-color:#fde68a;color:var(--amber)}
  .form-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
  .field{display:grid;gap:6px;margin-bottom:13px}
  .field label{font-size:11px;color:var(--muted);font-weight:700}
  .size-input{background:var(--panel-soft);border:1px solid var(--line);border-radius:8px;padding:10px}
  .size-input label{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--muted);margin-bottom:6px}
  .size-input input{width:100%;text-align:center;border:1px solid var(--line-strong);border-radius:7px;padding:8px;font-weight:800;background:#fff}
  .modal-mask{position:fixed;inset:0;background:rgba(15,23,42,.48);display:flex;align-items:center;justify-content:center;padding:18px;z-index:1000}
  .modal{width:min(560px,100%);max-height:92vh;overflow:auto;background:#fff;border-radius:12px;box-shadow:0 28px 70px rgba(15,23,42,.28)}
  .modal-head{display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--line);padding:16px 18px}
  .modal-title{font-size:18px;font-weight:850}
  .modal-body{padding:18px}
  .modal-foot{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:16px}
  .empty{padding:42px 20px;text-align:center;color:var(--muted);background:var(--panel);border:1px solid var(--line);border-radius:8px}
  .settings{grid-template-columns:minmax(0,1fr);max-width:880px}
  .setting-row{display:flex;justify-content:space-between;gap:16px;align-items:center;border-top:1px solid var(--line);padding:14px 0}
  .setting-row:first-child{border-top:0;padding-top:0}
  .setting-row strong{display:block;font-size:14px}
  .setting-row p{margin:4px 0 0;color:var(--muted);font-size:12px;line-height:1.6}
  .toast{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);z-index:1200;border-radius:8px;color:#fff;padding:11px 16px;font-weight:800;box-shadow:var(--shadow);background:var(--green)}
  .toast.err{background:var(--red)}
  .hidden{display:none!important}
  .mobile-nav{display:none}
  @media(max-width:920px){
    .app{display:block}
    .sidebar{display:none}
    .main{padding:16px 14px 92px;max-width:none}
    .mobile-bar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--line)}
    .stats{grid-template-columns:repeat(2,minmax(0,1fr))}
    .ops-grid{grid-template-columns:1fr}
    .form-grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    .page-head{align-items:flex-start}
    .mobile-nav{position:fixed;left:0;right:0;bottom:0;background:#fff;border-top:1px solid var(--line);display:grid;grid-template-columns:repeat(5,1fr);z-index:900;padding:7px 4px 12px}
    .mobile-nav button{border:0;background:transparent;color:var(--muted);font-size:11px;padding:7px 2px;border-radius:8px}
    .mobile-nav button.active{color:var(--blue);font-weight:800;background:var(--blue-soft)}
  }
  @media(max-width:560px){
    .products{grid-template-columns:1fr}
    .form-grid{grid-template-columns:1fr 1fr}
    .setting-row{display:grid}
    .modal-mask{align-items:flex-end;padding:0}
    .modal{border-radius:16px 16px 0 0;width:100%;max-height:94vh}
  }
</style>
</head>
<body>
<div id="app"></div>
<div id="modal-root"></div>
<div id="toast-root"></div>
<script>
(() => {
  "use strict";

  const BULK = "__bulk";
  const keys = {
    products: "wms_opt_products_v1",
    logs: "wms_opt_logs_v1",
    sizes: "wms_opt_sizes_v1",
    checks: "wms_opt_checks_v1",
    threshold: "wms_opt_threshold_v1",
    auth: "wms_opt_auth_v1",
    cloud: "wms_cloud_v1",
    cdn: "wms_cdn_v1"
  };
  const legacyKeys = {
    products: "wms_shoes_v4",
    productsV3: "wms_shoes_v3",
    logs: "wms_logs_v4",
    logsV3: "wms_logs_v3",
    sizes: "wms_sizes_v1",
    checks: "wms_checks_v1",
    threshold: "wms_thresh_v2",
    thresholdV1: "wms_thresh_v1"
  };
  const IDLE_TIMEOUT = 15 * 60 * 1000;
  const defaultSizes = ["36","37","38","39","40","41","42","43","44"];
  const defaultProducts = [
    {id:"p1",brand:"Nike",name:"Air Max",color:"黑色",price:0,image:""},
    {id:"p2",brand:"Nike",name:"Air Force 1",color:"白色",price:0,image:""},
    {id:"p3",brand:"Adidas",name:"Stan Smith",color:"白色",price:0,image:""},
    {id:"p4",brand:"New Balance",name:"574",color:"灰色",price:0,image:""},
    {id:"p5",brand:"Vans",name:"Old Skool",color:"黑白",price:0,image:""}
  ];
  const nav = [
    ["overview","总览"],
    ["ops","进出仓"],
    ["logs","流水"],
    ["products","款式"],
    ["settings","设置"]
  ];
  const migratedFromLegacy = migrateLegacyData();
  const state = {
    page: "overview",
    keyword: "",
    sort: "risk",
    logFilter: "all",
    isAdmin: false,
    products: load(keys.products, defaultProducts),
    logs: load(keys.logs, []),
    sizes: normalizeSizes(load(keys.sizes, defaultSizes)),
    checks: load(keys.checks, []),
    threshold: Number(load(keys.threshold, 3)) || 3,
    auth: load(keys.auth, null),
    modal: null
  };
  let pendingAdminAction = null;
  let toastTimer = null;
  let adminTimer = null;
  let syncStatus = "idle";
  let lastSync = "";
  let cloudSaveTimer = null;
  let applyingRemote = false;

  const app = document.getElementById("app");
  const modalRoot = document.getElementById("modal-root");
  const toastRoot = document.getElementById("toast-root");

  function load(key, fallback){
    try{
      const raw = localStorage.getItem(key);
      return raw ? JSON.parse(raw) : fallback;
    }catch{
      return fallback;
    }
  }
  function save(key, value){
    localStorage.setItem(key, JSON.stringify(value));
  }
  function meta(name){
    return document.querySelector(`meta[name="${name}"]`)?.content?.trim() || "";
  }
  function getCloudConfig(){
    const saved = load(keys.cloud, {});
    return {
      binId: saved.binId || meta("wms-bin-id"),
      masterKey: saved.masterKey || meta("wms-master-key")
    };
  }
  function getCdnConfig(){
    const saved = load(keys.cdn, {});
    return {
      cloudName: saved.cloudName || meta("wms-cdn-name"),
      uploadPreset: saved.uploadPreset || meta("wms-cdn-preset")
    };
  }
  function cloudOn(){
    const cfg = getCloudConfig();
    return !!cfg.binId && !!cfg.masterKey;
  }
  function cdnOn(){
    const cfg = getCdnConfig();
    return !!cfg.cloudName && !!cfg.uploadPreset;
  }
  function migrateLegacyData(){
    const hasNewData = localStorage.getItem(keys.products) || localStorage.getItem(keys.logs);
    if(hasNewData) return false;
    const legacyProducts = load(legacyKeys.products, null) || load(legacyKeys.productsV3, null);
    const legacyLogs = load(legacyKeys.logs, null) || load(legacyKeys.logsV3, null);
    if(!Array.isArray(legacyProducts) && !Array.isArray(legacyLogs)) return false;

    const products = Array.isArray(legacyProducts) ? legacyProducts.map(item => ({
      id: String(item.id || uid()),
      brand: String(item.brand || ""),
      name: String(item.name || ""),
      color: String(item.color || ""),
      price: Number(item.price) || 0,
      image: String(item.photoUrl || item.image || "")
    })) : defaultProducts;

    const sourceLogs = Array.isArray(legacyLogs) ? legacyLogs : [];
    const originalById = Object.fromEntries(sourceLogs.map(log => [log.id, log]));
    const logs = sourceLogs.map(log => {
      const original = log.reversedId ? originalById[log.reversedId] : null;
      const type = log.type === "check-adjust" ? "adjust" : String(log.type || "in");
      return {
        id: String(log.id || uid()),
        type,
        productId: String(log.productId || log.shoeId || ""),
        size: Number(log.size) === 0 ? BULK : String(log.size),
        qty: Number(log.qty) || 0,
        channel: String(log.channel || original?.channel || ""),
        note: String(log.note || ""),
        date: String(log.date || todayKey()),
        time: String(log.time || new Date().toISOString()),
        reversedId: log.reversedId ? String(log.reversedId) : undefined
      };
    }).filter(log => log.productId);

    save(keys.products, products);
    save(keys.logs, logs);
    save(keys.sizes, normalizeSizes(load(legacyKeys.sizes, defaultSizes)));
    save(keys.checks, Array.isArray(load(legacyKeys.checks, [])) ? load(legacyKeys.checks, []) : []);
    save(keys.threshold, Number(load(legacyKeys.threshold, load(legacyKeys.thresholdV1, 3))) || 3);
    return true;
  }
  function saveData(){
    save(keys.products, state.products);
    save(keys.logs, state.logs);
    save(keys.sizes, state.sizes);
    save(keys.checks, state.checks);
    save(keys.threshold, state.threshold);
    if(!applyingRemote) scheduleCloudSave();
  }
  function uid(){
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }
  function todayKey(){
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  }
  function timeLabel(iso){
    return new Date(iso).toLocaleTimeString("zh-CN",{hour:"2-digit",minute:"2-digit"});
  }
  function dateLabel(date){
    return new Date(date + "T12:00:00").toLocaleDateString("zh-CN",{month:"2-digit",day:"2-digit",weekday:"short"});
  }
  function money(n){
    return n > 0 ? `¥${Math.round(n).toLocaleString("zh-CN")}` : "—";
  }
  function esc(value){
    return String(value ?? "").replace(/[&<>"']/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#39;" }[c]));
  }
  function csvCell(value){
    const s = String(value ?? "");
    return /[",\r\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
  }
  function normalizeSizes(list){
    return [...new Set((Array.isArray(list) ? list : defaultSizes).map(v => String(v).trim()).filter(Boolean))]
      .sort((a,b) => Number(a) - Number(b));
  }
  function productById(){
    return Object.fromEntries(state.products.map(p => [p.id, p]));
  }
  function buildInventory(){
    const inv = {};
    state.products.forEach(p => {
      inv[p.id] = {[BULK]:0};
      state.sizes.forEach(size => inv[p.id][size] = 0);
    });
    state.logs.slice().reverse().forEach(log => {
      if(!inv[log.productId]) return;
      const size = String(log.size || BULK);
      if(inv[log.productId][size] === undefined) inv[log.productId][size] = 0;
      const qty = Number(log.qty) || 0;
      if(log.type === "in") inv[log.productId][size] += qty;
      if(log.type === "out") inv[log.productId][size] -= qty;
      if(log.type === "reverse-in") inv[log.productId][size] -= qty;
      if(log.type === "reverse-out") inv[log.productId][size] += qty;
      if(log.type === "adjust") inv[log.productId][size] += qty;
    });
    return inv;
  }
  function toLegacyShoe(product){
    return {
      id: product.id,
      brand: product.brand,
      name: product.name,
      color: product.color,
      price: Number(product.price) || 0,
      photoUrl: product.image || ""
    };
  }
  function toLegacyLog(log){
    return {
      id: log.id,
      type: log.type === "adjust" ? "check-adjust" : log.type,
      shoeId: log.productId,
      size: log.size === BULK ? 0 : log.size,
      qty: Number(log.qty) || 0,
      note: log.note || "",
      channel: log.channel || "",
      date: log.date,
      time: log.time,
      ...(log.reversedId ? {reversedId: log.reversedId} : {})
    };
  }
  function cloudPayload(){
    return {
      version: 3,
      updatedAt: new Date().toISOString(),
      products: state.products,
      shoes: state.products.map(toLegacyShoe),
      logs: state.logs.map(toLegacyLog),
      sizes: state.sizes,
      checks: state.checks,
      threshold: state.threshold
    };
  }
  async function cloudFetch(){
    const cfg = getCloudConfig();
    const res = await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}/latest`, {
      headers: {"X-Master-Key": cfg.masterKey}
    });
    if(!res.ok) throw new Error("云端读取失败");
    const data = await res.json();
    return data.record || {};
  }
  async function cloudSaveNow(){
    if(!cloudOn()) return;
    const cfg = getCloudConfig();
    syncStatus = "syncing";
    renderShell();
    const res = await fetch(`https://api.jsonbin.io/v3/b/${cfg.binId}`, {
      method: "PUT",
      headers: {
        "Content-Type": "application/json",
        "X-Master-Key": cfg.masterKey,
        "X-Bin-Versioning": "false"
      },
      body: JSON.stringify(cloudPayload())
    });
    if(!res.ok) throw new Error("云端保存失败");
    syncStatus = "ok";
    lastSync = new Date().toLocaleTimeString("zh-CN", {hour:"2-digit", minute:"2-digit"});
    renderShell();
  }
  function scheduleCloudSave(){
    if(!cloudOn()) return;
    clearTimeout(cloudSaveTimer);
    syncStatus = "syncing";
    cloudSaveTimer = setTimeout(async () => {
      try{
        await cloudSaveNow();
      }catch(err){
        syncStatus = "error";
        renderShell();
        showToast(err.message, true);
      }
    }, 900);
  }
  async function pullCloud(quiet=false){
    if(!cloudOn()) return;
    if(!quiet){
      syncStatus = "syncing";
      renderShell();
    }
    try{

  function totalOf(inv, id){
    const stock = inv[id] || {};
    return state.sizes.reduce((sum, size) => sum + (stock[size] || 0), stock[BULK] || 0);
  }
  function statusFor(qty){
    if(qty <= 0) return "zero";
    if(qty <= state.threshold) return "low";
    return "ok";
  }
  function stockGrid(inv, id){
    return `<div class="stock-grid" style="--size-count:${state.sizes.length}">${state.sizes.map(size => {
      const qty = inv[id]?.[size] || 0;
      return `<div class="stock-cell ${statusFor(qty)}"><span>${esc(size)}</span><b>${qty}</b></div>`;
    }).join("")}</div>`;
  }
  function reversible(log){
    return (log.type === "in" || log.type === "out") && !state.logs.some(item => item.reversedId === log.id);
  }
  function stats(inv){
    const today = todayKey();
    const todayLogs = state.logs.filter(log => log.date === today);
    const sum = (type, channel) => todayLogs
      .filter(log => log.type === type && (!channel || log.channel === channel))
      .reduce((n, log) => n + Number(log.qty || 0), 0);
    const totalStock = state.products.reduce((n, p) => n + totalOf(inv, p.id), 0);
    const soldout = state.products.filter(p => state.sizes.some(size => (inv[p.id]?.[size] || 0) <= 0)).length;
    const low = state.products.filter(p => state.sizes.some(size => {
      const qty = inv[p.id]?.[size] || 0;
      return qty > 0 && qty <= state.threshold;
    })).length;
    const value = state.products.reduce((n, p) => n + totalOf(inv, p.id) * (Number(p.price) || 0), 0);
    return {
      totalStock,
      todayIn: sum("in") - sum("reverse-in"),
      todayOut: sum("out") - sum("reverse-out"),
      onlineOut: sum("out","网店") - sum("reverse-out","网店"),

      if(state.sort === "stock-desc") return totalOf(inv,b.id) - totalOf(inv,a.id);

        const br = state.sizes.filter(size => (inv[b.id]?.[size] || 0) <= state.threshold).length;

  async function pbkdf2(password, salt, iterations=120000){
    const enc = new TextEncoder();
    const key = await crypto.subtle.importKey("raw", enc.encode(password), "PBKDF2", false, ["deriveBits"]);
    const bits = await crypto.subtle.deriveBits({name:"PBKDF2", salt: enc.encode(salt), iterations, hash:"SHA-256"}, key, 256);
    return Array.from(new Uint8Array(bits)).map(b => b.toString(16).padStart(2,"0")).join("");
  }

  function compressImage(file){
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onerror = reject;
      reader.onload = () => {
        const img = new Image();
        img.onerror = reject;
        img.onload = () => {
          const max = 760;
          let {width, height} = img;
          if(width > height && width > max){ height = Math.round(height * max / width); width = max; }
          if(height >= width && height > max){ width = Math.round(width * max / height); height = max; }
          const canvas = document.createElement("canvas");
          canvas.width = width;
          canvas.height = height;
          canvas.getContext("2d").drawImage(img, 0, 0, width, height);
          resolve(canvas.toDataURL("image/jpeg", .82));
        };
        img.src = reader.result;
      };
      reader.readAsDataURL(file);
    });
  }
  async function uploadToCloudinary(dataUrl){

    const data = await res.json().catch(() => ({}));
    if(!res.ok) throw new Error(data.error?.message || "上传失败");
    return String(data.secure_url || "").replace("/upload/", "/upload/c_fill,w_500,h_500,q_auto,f_auto/");
  }

  function parseImportText(text){

      const start = clean.indexOf("{");
      const end = clean.lastIndexOf("}");
      if(start >= 0 && end > start) return JSON.parse(clean.slice(start, end + 1));

    }
  }
  function maybeJson(value){

  }
  function fromStorageDump(raw){
    const source = raw?.localStorage && typeof raw.localStorage === "object" ? raw.localStorage : raw;
    if(!source || typeof source !== "object" || Array.isArray(source)) return null;
    const readAny = (...names) => {
      for(const name of names){
        if(source[name] !== undefined) return maybeJson(source[name]);
      }
      return undefined;
    };
    const storedProducts = readAny(keys.products, legacyKeys.products, legacyKeys.productsV3);
    const storedLogs = readAny(keys.logs, legacyKeys.logs, legacyKeys.logsV3);
    if(!Array.isArray(storedProducts) || !Array.isArray(storedLogs)) return null;
    const storedSizes = readAny(keys.sizes, legacyKeys.sizes);
    const storedChecks = readAny(keys.checks, legacyKeys.checks);
    const storedThreshold = readAny(keys.threshold, legacyKeys.threshold, legacyKeys.thresholdV1);
    return {
      products: storedProducts,
      logs: storedLogs,
      sizes: Array.isArray(storedSizes) ? storedSizes : undefined,
      checks: Array.isArray(storedChecks) ? storedChecks : [],
      threshold: Number(storedThreshold) || undefined
    };
  }
  function findBackupPayload(raw, depth=0, seen=new Set()){
    const data = maybeJson(raw);
    if(!data || typeof data !== "object" || depth > 5 || seen.has(data)) return null;
    seen.add(data);
    const storagePayload = fromStorageDump(data);
    if(storagePayload) return storagePayload;
    if((Array.isArray(data.products) || Array.isArray(data.shoes)) && Array.isArray(data.logs)) return data;
    if(data.record){
      const found = findBackupPayload(data.record, depth + 1, seen);
      if(found) return found;
    }
    for(const value of Object.values(data)){
      const found = findBackupPayload(value, depth + 1, seen);
      if(found) return found;
    }
    return null;
  }
  function normalizeImportedData(raw){
    const data = findBackupPayload(raw);
    if(!data) throw new Error("不支持的备份格式，请导入 JSON 备份或 localStorage 导出文件");
    const sourceProducts = Array.isArray(data.products) ? data.products : Array.isArray(data.shoes) ? data.shoes : null;
    const sourceLogs = Array.isArray(data.logs) ? data.logs : null;
    if(!sourceProducts || !sourceLogs) throw new Error("不支持的备份格式，请导入 JSON 备份或 localStorage 导出文件");

    const products = sourceProducts.map(item => ({
      id: String(item.id || uid()),
      brand: String(item.brand || ""),
      name: String(item.name || ""),
      color: String(item.color || ""),
      price: Number(item.price) || 0,
      image: String(item.image || item.photoUrl || "")
    }));

    const originalById = Object.fromEntries(sourceLogs.map(log => [log.id, log]));
    const logs = sourceLogs.map(log => {
      const original = log.reversedId ? originalById[log.reversedId] : null;
      const type = log.type === "check-adjust" ? "adjust" : String(log.type || "in");
      return {
        id: String(log.id || uid()),
        type,
        productId: String(log.productId || log.shoeId || ""),
        size: Number(log.size) === 0 ? BULK : String(log.size || BULK),
        qty: Number(log.qty) || 0,
        channel: String(log.channel || original?.channel || ""),
        note: String(log.note || ""),
        date: String(log.date || todayKey()),
        time: String(log.time || new Date().toISOString()),
        reversedId: log.reversedId ? String(log.reversedId) : undefined
      };
    }).filter(log => log.productId);

    return {
      products,
      logs,
      sizes: normalizeSizes(data.sizes || state.sizes),
      checks: Array.isArray(data.checks) ? data.checks : [],
      threshold: Number(data.threshold || data.lowThresh || state.threshold) || state.threshold
    };
  }

  }

    if(action === "submit-auth") return submitAuth();
    if(action === "reset-auth") return resetAuth();
    if(action === "submit-change-auth") return submitChangeAuth();
    if(action === "submit-stock") return submitStock();
    if(action === "submit-check") return submitCheck();
    if(action === "open-stock") return openStock(actionEl.dataset.mode, actionEl.dataset.id);
    if(action === "reverse-log") return reverseLog(actionEl.dataset.id);
  });
  modalRoot.addEventListener("change", event => {
    if(event.target.id === "stockProduct" && state.modal?.type === "stock"){
      state.modal.id = event.target.value;
      renderShell();
    }
  });
  modalRoot.addEventListener("submit", event => {
    if(event.target.id === "productForm") saveProduct(event);
  });
  app.addEventListener("input", event => {
    if(event.target.id === "keyword"){
      state.keyword = event.target.value;
      renderShell();
    }
  });
  app.addEventListener("change", event => {
    if(event.target.id === "sort"){
      state.sort = event.target.value;
      renderShell();
    }
    if(event.target.id === "logFilter"){
      state.logFilter = event.target.value;
      renderShell();
    }
    if(event.target.matches("[data-image-input]")){
      setImage(event.target.dataset.imageInput, event.target.files[0]);
    }
    if(event.target.id === "importFile"){
      importJson(event.target.files[0]);
      event.target.value = "";
    }
  });
  app.addEventListener("click", event => {
    if(event.target.matches("[data-sort-risk]")){
      state.sort = "risk";
      renderShell();
    }
  });
  window.addEventListener("keydown", event => {
    if(event.key === "Escape" && state.modal) closeModal();
  });
  ["mousedown","keydown","touchstart","scroll"].forEach(name => {
    window.addEventListener(name, () => {
      if(state.isAdmin) resetAdminTimer();
    }, {passive:true});
  });

  renderShell();
  if(cloudOn()){
    pullCloud(true);
    setInterval(() => pullCloud(true), 60000);
    window.addEventListener("focus", () => pullCloud(true));
  }
  if(migratedFromLegacy) showToast("已自动迁移旧版本地数据");
})();
</script>
</body>
</html>
